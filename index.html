<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-RM Klinik Pratama Pro v2.0 | RS Mitra Plumbon</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root {
  --c-orange:  #f58320;
  --c-orange2: #f5a45a;
  --c-teal:    #119c9f;
  --c-teal2:   #3ea4ac;
  --c-teal3:   #54b0b2;
  --c-teal4:   #7fb9c0;
  --c-dark:    #0b1e24;
  --c-dark2:   #122b33;
  --c-dark3:   #1a3640;
  --c-muted:   #8ba8ae;
  --sidebar-w: 260px;
}

* { box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #f0f6f7;
  color: #1a3640;
  transition: background 0.3s, color 0.3s;
}

body.dark {
  background: var(--c-dark);
  color: #e2edef;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--c-teal4); border-radius: 10px; }

/* ===== SPLASH ===== */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--c-dark);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px;
}
.splash-ring {
  width: 72px; height: 72px; border-radius: 50%;
  border: 3px solid rgba(127,185,192,0.2);
  border-top-color: var(--c-teal);
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
.splash-logo {
  width: 48px; height: 48px; border-radius: 14px;
  background: linear-gradient(135deg, var(--c-teal), var(--c-teal2));
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 22px; position: absolute;
}
.splash-ring-wrap { position: relative; display: flex; align-items: center; justify-content: center; }

/* ===== LOGIN ===== */
#login-section {
  position: fixed; inset: 0; z-index: 500;
  background: var(--c-dark);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.login-orb {
  position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.25;
}
.login-card {
  background: rgba(26,54,64,0.85);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(127,185,192,0.15);
  border-radius: 24px; padding: 40px;
  width: 100%; max-width: 420px;
  position: relative; z-index: 10;
  animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to { opacity: 1; transform: none; }
}
.login-input {
  width: 100%; background: rgba(127,185,192,0.07);
  border: 1px solid rgba(127,185,192,0.2);
  border-radius: 12px; padding: 13px 16px;
  color: #e2edef; font-family: 'DM Sans', sans-serif; font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.login-input::placeholder { color: var(--c-muted); }
.login-input:focus { border-color: var(--c-teal); }
.btn-login {
  width: 100%;
  background: linear-gradient(135deg, var(--c-teal), var(--c-teal2));
  color: white; font-weight: 700; font-size: 15px;
  border: none; border-radius: 12px; padding: 14px;
  cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  font-family: 'DM Sans', sans-serif;
}
.btn-login:hover { opacity: 0.9; }
.btn-login:active { transform: scale(0.98); }

/* ===== LAYOUT ===== */
#app-wrapper { display: none; }
#app-wrapper.show { display: flex; height: 100vh; overflow: hidden; }

/* ===== SIDEBAR ===== */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--c-dark2);
  border-right: 1px solid rgba(127,185,192,0.1);
  display: flex; flex-direction: column;
  transition: transform 0.3s ease;
  position: relative; z-index: 50;
}
body.dark #sidebar { background: #0d2229; }

.sidebar-logo {
  padding: 24px 20px;
  border-bottom: 1px solid rgba(127,185,192,0.08);
  display: flex; align-items: center; gap: 12px;
}
.logo-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--c-teal), var(--c-orange));
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 17px; flex-shrink: 0;
}
.logo-text { color: white; font-weight: 700; font-size: 17px; line-height: 1; }
.logo-sub { color: var(--c-teal4); font-size: 10px; margin-top: 3px; font-weight: 400; }

#main-nav { flex: 1; overflow-y: auto; padding: 12px 12px; }

.nav-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
  color: rgba(127,185,192,0.4); text-transform: uppercase;
  padding: 8px 12px 4px; margin-top: 8px;
}

.sidebar-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; border-radius: 10px;
  cursor: pointer; margin-bottom: 2px;
  color: #8ba8ae; font-size: 13.5px; font-weight: 500;
  transition: all 0.18s; position: relative;
}
.sidebar-item:hover { background: rgba(127,185,192,0.08); color: var(--c-teal4); }
.sidebar-item.active {
  background: linear-gradient(135deg, rgba(17,156,159,0.2), rgba(62,164,172,0.1));
  color: white;
  border: 1px solid rgba(127,185,192,0.15);
}
.sidebar-item.active::before {
  content: ''; position: absolute; left: 0; top: 50%;
  transform: translateY(-50%); width: 3px; height: 60%;
  background: linear-gradient(to bottom, var(--c-teal), var(--c-teal2));
  border-radius: 0 3px 3px 0;
}
.sidebar-item i { width: 18px; text-align: center; font-size: 13px; }

.sidebar-footer {
  padding: 16px; border-top: 1px solid rgba(127,185,192,0.08);
}
.user-card {
  background: rgba(127,185,192,0.06);
  border: 1px solid rgba(127,185,192,0.1);
  border-radius: 12px; padding: 12px 14px;
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.user-avatar {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--c-teal), var(--c-orange));
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 15px; flex-shrink: 0;
}
.user-name { color: #e2edef; font-weight: 600; font-size: 13px; line-height: 1.2; }
.user-role { color: var(--c-teal4); font-size: 10px; margin-top: 2px; }
.btn-logout {
  width: 100%; display: flex; align-items: center; justify-content: center; gap-8px gap: 8px;
  padding: 9px; border-radius: 10px; border: none; cursor: pointer;
  background: rgba(245,131,32,0.08); color: var(--c-orange2);
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  transition: background 0.2s;
}
.btn-logout:hover { background: rgba(245,131,32,0.15); }

/* ===== MAIN AREA ===== */
main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  height: 60px; padding: 0 24px;
  background: white; border-bottom: 1px solid #e0ecee;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; z-index: 40;
}
body.dark .topbar { background: #0e2530; border-color: rgba(127,185,192,0.1); }
.topbar-title { font-weight: 700; font-size: 17px; color: var(--c-dark3); }
body.dark .topbar-title { color: #e2edef; }
.topbar-date { font-size: 12px; color: var(--c-muted); margin-top: 1px; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.topbar-btn {
  width: 36px; height: 36px; border-radius: 10px; border: none;
  background: #f0f6f7; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--c-teal); transition: background 0.2s; font-size: 14px;
}
body.dark .topbar-btn { background: rgba(127,185,192,0.08); color: var(--c-teal4); }
.topbar-btn:hover { background: rgba(17,156,159,0.1); }
.online-dot { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: #22c55e; }
.dot-pulse { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; position: relative; }
.dot-pulse::after {
  content: ''; position: absolute; inset: -3px; border-radius: 50%;
  background: rgba(34,197,94,0.3); animation: pulse-dot 1.5s ease infinite;
}
@keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:0.7} 50%{transform:scale(1.5);opacity:0} }

#content-display {
  flex: 1; overflow-y: auto; padding: 24px;
  background: #f0f6f7;
}
body.dark #content-display { background: var(--c-dark); }

/* ===== CARDS ===== */
.card {
  background: white; border-radius: 16px;
  border: 1px solid #dceef0; padding: 20px;
  transition: box-shadow 0.2s;
}
body.dark .card { background: #122b33; border-color: rgba(127,185,192,0.1); }
.card:hover { box-shadow: 0 4px 20px rgba(17,156,159,0.08); }

.stat-card {
  background: white; border-radius: 16px; padding: 20px;
  border: 1px solid #dceef0;
  position: relative; overflow: hidden;
}
body.dark .stat-card { background: #122b33; border-color: rgba(127,185,192,0.1); }
.stat-card::after {
  content: ''; position: absolute; right: -20px; top: 50%; transform: translateY(-50%);
  width: 80px; height: 80px; border-radius: 50%;
  background: currentColor; opacity: 0.04;
}
.stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--c-muted); }
.stat-value { font-size: 32px; font-weight: 700; margin-top: 4px; line-height: 1; }
.stat-stripe { width: 4px; border-radius: 0 4px 4px 0; position: absolute; left: 0; top: 0; bottom: 0; }

/* ===== PATIENT CARDS ===== */
.patient-card {
  background: white; border-radius: 14px; padding: 18px;
  border: 1px solid #dceef0; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
}
body.dark .patient-card { background: #122b33; border-color: rgba(127,185,192,0.1); }
.patient-card:hover {
  border-color: var(--c-teal3);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(17,156,159,0.12);
}
.patient-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--c-teal), var(--c-teal2));
  opacity: 0; transition: opacity 0.2s;
}
.patient-card:hover::before { opacity: 1; }

/* ===== BADGE / STATUS ===== */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
}
.badge-perawat  { background: #fff3e8; color: var(--c-orange); }
.badge-dokter   { background: #fef2f2; color: #ef4444; }
.badge-farmasi  { background: rgba(17,156,159,0.1); color: var(--c-teal); }
.badge-kasir    { background: #f0fdf4; color: #16a34a; }
.badge-selesai  { background: #f1f5f9; color: #64748b; }
.badge-radiologi{ background: #eff6ff; color: #3b82f6; }
.badge-lab      { background: #f5f3ff; color: #7c3aed; }
.badge-master   { background: rgba(17,156,159,0.08); color: var(--c-teal2); }

/* ===== FORMS ===== */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--c-muted); margin-bottom: 6px;
}
.form-input {
  width: 100%; padding: 11px 14px; border-radius: 10px;
  border: 1.5px solid #dceef0; outline: none;
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  background: #f8fbfb; color: var(--c-dark3);
  transition: border-color 0.2s, background 0.2s;
}
body.dark .form-input { background: rgba(127,185,192,0.05); border-color: rgba(127,185,192,0.15); color: #e2edef; }
.form-input:focus { border-color: var(--c-teal); background: white; }
body.dark .form-input:focus { background: rgba(127,185,192,0.08); }
.form-input::placeholder { color: #b0c4c8; }
.form-input[readonly] { background: #f0f6f7; color: var(--c-teal); font-family: 'DM Mono', monospace; font-weight: 500; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 11px 20px; border-radius: 10px; border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
  transition: all 0.18s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: linear-gradient(135deg, var(--c-teal), var(--c-teal2)); color: white; }
.btn-primary:hover { opacity: 0.92; box-shadow: 0 4px 12px rgba(17,156,159,0.35); }
.btn-orange { background: linear-gradient(135deg, var(--c-orange), var(--c-orange2)); color: white; }
.btn-orange:hover { opacity: 0.92; box-shadow: 0 4px 12px rgba(245,131,32,0.35); }
.btn-ghost { background: #f0f6f7; color: var(--c-dark3); }
body.dark .btn-ghost { background: rgba(127,185,192,0.08); color: #e2edef; }
.btn-ghost:hover { background: #e0ecee; }
.btn-danger { background: #fee2e2; color: #ef4444; }
.btn-danger:hover { background: #ef4444; color: white; }
.btn-success { background: #dcfce7; color: #16a34a; }
.btn-success:hover { background: #16a34a; color: white; }
.btn-sm { padding: 7px 14px; font-size: 12px; }
.btn-full { width: 100%; }

/* ===== TABLES ===== */
.tbl { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.tbl th {
  padding: 10px 14px; text-align: left; font-size: 10px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--c-muted); border-bottom: 1px solid #dceef0;
}
body.dark .tbl th { border-color: rgba(127,185,192,0.1); }
.tbl td {
  padding: 12px 14px; border-bottom: 1px solid #f0f6f7;
  color: var(--c-dark3);
}
body.dark .tbl td { border-color: rgba(127,185,192,0.06); color: #d0e0e3; }
.tbl tr:hover td { background: rgba(17,156,159,0.03); }
.tbl tr:last-child td { border-bottom: none; }

/* ===== TOAST ===== */
#toast-container {
  position: fixed; top: 16px; right: 16px;
  z-index: 99999; display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.toast {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-radius: 12px; min-width: 280px;
  font-size: 13px; font-weight: 600; pointer-events: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  border: 1px solid transparent;
}
@keyframes toastIn { from { opacity:0; transform: translateX(60px); } }
@keyframes toastOut { to { opacity:0; transform: translateX(60px); } }
.toast-success { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; }
.toast-error   { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
.toast-warning { background: #fffbeb; color: #92400e; border-color: #fde68a; }
.toast-icon { width: 24px; height: 24px; border-radius: 50%; display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; }
.toast-success .toast-icon { background: #a7f3d0; color: #065f46; }
.toast-error .toast-icon   { background: #fecaca; color: #991b1b; }
.toast-warning .toast-icon { background: #fde68a; color: #92400e; }

/* ===== MODAL ===== */
#modal-container {
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(11,30,36,0.7); backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center; padding: 16px;
}
#modal-container.show { display: flex; }
#modal-body {
  background: white; border-radius: 20px; width: 100%;
  max-width: 860px; max-height: 90vh; overflow-y: auto;
  padding: 28px; position: relative;
  animation: modalIn 0.3s cubic-bezier(0.34,1.2,0.64,1) both;
}
body.dark #modal-body { background: #0e2530; color: #e2edef; }
@keyframes modalIn { from { opacity:0; transform: scale(0.93) translateY(20px); } }
.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 32px; height: 32px; border-radius: 8px; border: none;
  background: #f0f6f7; color: var(--c-muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.2s;
}
body.dark .modal-close { background: rgba(127,185,192,0.1); color: var(--c-teal4); }
.modal-close:hover { background: var(--c-teal); color: white; }

/* ===== SIDEBAR OVERLAY (mobile) ===== */
#sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 45;
}

/* ===== MOBILE ===== */
@media(max-width: 768px) {
  #sidebar {
    position: fixed; inset-y: 0; left: 0;
    transform: translateX(-100%);
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-overlay.show { display: block; }
  #content-display { padding: 16px; }
}

/* ===== ANIMATIONS ===== */
.fade-up {
  animation: fadeUp 0.35s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(16px); }
}
.fade-in { animation: fadeIn2 0.3s ease both; }
@keyframes fadeIn2 { from { opacity:0; } }

/* ===== SKELETON ===== */
.skeleton {
  background: linear-gradient(90deg, #e8f0f1 25%, #d5e6e8 50%, #e8f0f1 75%);
  background-size: 200% 100%;
  animation: skel 1.5s infinite;
  border-radius: 8px;
}
body.dark .skeleton {
  background: linear-gradient(90deg, #1a3640 25%, #1e404c 50%, #1a3640 75%);
  background-size: 200% 100%;
}
@keyframes skel { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ===== MISC ===== */
.font-mono { font-family: 'DM Mono', monospace; }
.section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.divider { height: 1px; background: #dceef0; margin: 16px 0; }
body.dark .divider { background: rgba(127,185,192,0.1); }

.resep-item, .tindakan-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; border-radius: 8px;
  background: #f8fbfb; border: 1px solid #dceef0;
  font-size: 13px; margin-bottom: 6px;
}
body.dark .resep-item, body.dark .tindakan-item { background: rgba(127,185,192,0.05); border-color: rgba(127,185,192,0.1); }

.ttv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.stok-card {
  background: #122b33; border: 1px solid rgba(127,185,192,0.15);
  border-radius: 14px; padding: 16px; position: relative; overflow: hidden;
}
.stok-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--c-teal), var(--c-teal2));
}

.queue-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-radius: 10px;
  background: #f8fbfb; border: 1px solid #dceef0; margin-bottom: 6px;
  font-size: 13px;
}
body.dark .queue-row { background: rgba(127,185,192,0.04); border-color: rgba(127,185,192,0.1); }

.tab-bar {
  display: flex; gap: 4px; padding: 4px; background: #f0f6f7;
  border-radius: 12px; margin-bottom: 20px;
}
body.dark .tab-bar { background: rgba(127,185,192,0.06); }
.tab-btn {
  flex: 1; padding: 8px; border: none; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; background: none; color: var(--c-muted); transition: all 0.2s;
}
.tab-btn.active { background: white; color: var(--c-teal); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
body.dark .tab-btn.active { background: var(--c-dark3); color: var(--c-teal4); }
</style>
</head>
<body>

<div id="toast-container"></div>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-ring-wrap">
    <div class="splash-ring"></div>
    <div class="splash-logo"><i class="fas fa-notes-medical"></i></div>
  </div>
  <div style="text-align:center">
    <p style="color:#7fb9c0; font-size:13px; font-weight:600;" id="splash-text">Menghubungkan ke server...</p>
  </div>
</div>

<!-- LOGIN -->
<div id="login-section" class="hidden">

<div id="modal-container">
  <div id="modal-body"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, set, get, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx1cYtGcnppOhMmhH0wOXqwGFWLiGM7kk",
  authDomain: "develop-212.firebaseapp.com",
  databaseURL: "https://develop-212-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "develop-212",
  storageBucket: "develop-212.firebasestorage.app",
  messagingSenderId: "79717438597",
  appId: "1:79717438597:web:e28c0be0c64667891ec5ec"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null, userData = null, isFirstLoad = true;

const rolesMap = {
  'admin':       { icon: 'fa-user-shield', label: 'Admin/Owner',    modules: ['dashboard','pendaftaran','perawat','dokter','radiologi','lab','farmasi','gudang','kasir','master'] },
  'pendaftaran': { icon: 'fa-id-card',     label: 'Pendaftaran',    modules: ['dashboard','pendaftaran'] },
  'perawat':     { icon: 'fa-user-nurse',  label: 'Perawat',        modules: ['dashboard','perawat'] },
  'dokter':      { icon: 'fa-user-md',     label: 'Dokter',         modules: ['dashboard','dokter'] },
  'radiologi':   { icon: 'fa-x-ray',       label: 'Radiologi',      modules: ['dashboard','radiologi'] },
  'lab':         { icon: 'fa-microscope',  label: 'Laboratorium',   modules: ['dashboard','lab'] },
  'farmasi':     { icon: 'fa-pills',       label: 'Farmasi',        modules: ['dashboard','farmasi'] },
  'gudang':      { icon: 'fa-warehouse',   label: 'Gudang Farmasi', modules: ['dashboard','gudang'] },
  'kasir':       { icon: 'fa-receipt',     label: 'Kasir',          modules: ['dashboard','kasir'] }
};

const modConfig = {
  'dashboard':   { label: 'Dashboard',          icon: 'fa-chart-pie',         group: 'menu' },
  'pendaftaran': { label: 'Pendaftaran',         icon: 'fa-user-plus',         group: 'menu' },
  'perawat':     { label: 'Perawat (TTV)',       icon: 'fa-stethoscope',       group: 'klinik' },
  'dokter':      { label: 'Pemeriksaan Dokter',  icon: 'fa-user-md',           group: 'klinik' },
  'radiologi':   { label: 'Unit Radiologi',      icon: 'fa-x-ray',             group: 'klinik' },
  'lab':         { label: 'Unit Lab',            icon: 'fa-vials',             group: 'klinik' },
  'farmasi':     { label: 'Apotek/Farmasi',      icon: 'fa-pills',             group: 'farmasi' },
  'gudang':      { label: 'Stok Obat',           icon: 'fa-boxes-stacked',     group: 'farmasi' },
  'kasir':       { label: 'Kasir & Billing',     icon: 'fa-receipt',           group: 'keuangan' },
  'master':      { label: 'Data Master',         icon: 'fa-database',          group: 'keuangan' }
};

// ===== SPLASH =====
const connRef = ref(db, '.info/connected');
onValue(connRef, snap => {
  if (snap.val()) {
    if (isFirstLoad) document.getElementById('splash-text').textContent = 'Memeriksa sesi...';
  } else {
    document.getElementById('splash-text').textContent = 'Menunggu koneksi...';
  }
});

// ===== AUTH =====
document.getElementById('login-form').onsubmit = async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button[type=submit]');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px"></i> Masuk...';
  btn.disabled = true;
  try {
    await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value);
    toast('Selamat datang!', 'success');
  } catch (err) {
    toast('Login gagal: ' + err.message, 'error');
    btn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right:8px"></i> Masuk ke Sistem';
    btn.disabled = false;
  }
};

onAuthStateChanged(auth, async (user) => {
  const splash = document.getElementById('splash');
  const loginSec = document.getElementById('login-section');
  const appWrap = document.getElementById('app-wrapper');

  if (user) {
    currentUser = user;
    const snap = await get(ref(db, `users/${user.uid}`));
    userData = snap.exists() ? snap.val() : { role: 'admin', name: user.email.split('@')[0] };
    loginSec.classList.add('hidden');
    appWrap.classList.add('show');
    if (isFirstLoad) toast(`Halo, ${userData.name}!`, 'success');
    initAppUI();
  } else {
    appWrap.classList.remove('show');
    loginSec.classList.remove('hidden');
  }

  if (isFirstLoad) {
    setTimeout(() => {
      splash.style.animation = 'fadeOut 0.4s ease forwards';
      setTimeout(() => splash.style.display = 'none', 400);
      isFirstLoad = false;
    }, 1400);
  }
});

window.logout = () => signOut(auth);

// ===== UI INIT =====
function initAppUI() {
  const initial = userData.name.charAt(0).toUpperCase();
  document.getElementById('user-initial').textContent = initial;
  document.getElementById('user-display-name').textContent = userData.name;
  document.getElementById('user-role-label').textContent = rolesMap[userData.role]?.label || userData.role;
  document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  renderSidebar();
  renderModule('dashboard');
}

function renderSidebar() {
  const nav = document.getElementById('main-nav');
  nav.innerHTML = '';
  const mods = rolesMap[userData.role]?.modules || ['dashboard'];
  const groups = { menu: 'Menu Utama', klinik: 'Klinik', farmasi: 'Farmasi', keuangan: 'Keuangan & Master' };
  let lastGroup = '';
  mods.forEach(mod => {
    const cfg = modConfig[mod];
    if (!cfg) return;
    if (cfg.group !== lastGroup) {
      const lbl = document.createElement('div');
      lbl.className = 'nav-label';
      lbl.textContent = groups[cfg.group] || cfg.group;
      nav.appendChild(lbl);
      lastGroup = cfg.group;
    }
    const div = document.createElement('div');
    div.className = `sidebar-item${mod === 'dashboard' ? ' active' : ''}`;
    div.dataset.mod = mod;
    div.innerHTML = `<i class="fas ${cfg.icon}"></i><span>${cfg.label}</span>`;
    div.onclick = () => {
      document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
      div.classList.add('active');
      document.getElementById('page-title').textContent = cfg.label;
      if (window.innerWidth < 768) toggleSidebar();
      renderModule(mod);
    };
    nav.appendChild(div);
  });
}

function renderModule(mod) {
  const display = document.getElementById('content-display');
  display.innerHTML = '';
  switch(mod) {
    case 'dashboard':   renderDashboard(display);  break;
    case 'pendaftaran': renderPendaftaran(display); break;
    case 'perawat':     renderPerawat(display);     break;
    case 'dokter':      renderDokter(display);      break;
    case 'gudang':      renderGudang(display);      break;
    case 'farmasi':     renderFarmasi(display);     break;
    case 'kasir':       renderKasir(display);       break;
    case 'radiologi':   renderPenunjang(display,'radiologi'); break;
    case 'lab':         renderPenunjang(display,'lab');       break;
    case 'master':      renderMaster(display);      break;
    default: display.innerHTML = `<div style="text-align:center;padding:60px;color:var(--c-muted)"><i class="fas fa-tools" style="font-size:48px;display:block;margin-bottom:12px;color:var(--c-teal4)"></i><p>Modul ${mod} sedang dikembangkan.</p></div>`;
  }
}

// ===== DASHBOARD =====
async function renderDashboard(el) {
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px">
      <div class="stat-card fade-up" style="animation-delay:0s">
        <div class="stat-stripe" style="background:var(--c-teal)"></div>
        <div class="stat-label">Pasien Hari Ini</div>
        <div class="stat-value" id="dash-pasien-count" style="color:var(--c-teal)">—</div>
      </div>
      <div class="stat-card fade-up" style="animation-delay:0.07s">
        <div class="stat-stripe" style="background:#22c55e"></div>
        <div class="stat-label">Selesai</div>
        <div class="stat-value" id="dash-done-count" style="color:#22c55e">—</div>
      </div>
      <div class="stat-card fade-up" style="animation-delay:0.14s">
        <div class="stat-stripe" style="background:var(--c-orange)"></div>
        <div class="stat-label">Menunggu Obat</div>
        <div class="stat-value" id="dash-farmasi-count" style="color:var(--c-orange)">—</div>
      </div>
      <div class="stat-card fade-up" style="animation-delay:0.21s">
        <div class="stat-stripe" style="background:#ef4444"></div>
        <div class="stat-label">Stok Kritis</div>
        <div class="stat-value" style="color:#ef4444" id="dash-kritis">—</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card fade-up" style="animation-delay:0.28s;height:300px">
        <div style="font-weight:700;font-size:14px;margin-bottom:14px;color:var(--c-dark3)" id="dark-lbl1">Statistik Kunjungan Mingguan</div>
        <canvas id="chartKunjungan" style="height:230px"></canvas>
      </div>
      <div class="card fade-up" style="animation-delay:0.35s;height:300px;overflow-y:auto">
        <div style="font-weight:700;font-size:14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
          <span>Antrian Berjalan</span>
          <span id="antrian-badge" style="background:rgba(17,156,159,0.1);color:var(--c-teal);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px">0</span>
        </div>
        <div id="live-antrian"></div>
      </div>
    </div>
  `;

  onValue(ref(db, 'pendaftaran'), snap => {
    const list = snap.exists() ? Object.values(snap.val()) : [];
    document.getElementById('dash-pasien-count').textContent = list.length;
    document.getElementById('dash-done-count').textContent = list.filter(p => p.status === 'SELESAI').length;
    document.getElementById('dash-farmasi-count').textContent = list.filter(p => p.status === 'FARMASI').length;
    const active = list.filter(p => p.status !== 'SELESAI');
    document.getElementById('antrian-badge').textContent = active.length;
    const antrian = document.getElementById('live-antrian');
    if (!antrian) return;
    antrian.innerHTML = list.slice(-6).reverse().map(p => `
      <div class="queue-row">
        <div>
          <div style="font-weight:600;font-size:13px">${p.nama}</div>
          <div class="font-mono" style="font-size:11px;color:var(--c-muted)">${p.norm}</div>
        </div>
        <span class="badge badge-${(p.status||'').toLowerCase()}">${p.status || '-'}</span>
      </div>
    `).join('');
  });

  onValue(ref(db, 'master_obat'), snap => {
    const data = snap.exists() ? Object.values(snap.val()) : [];
    const kritis = data.filter(o => o.stok < 10).length;
    const el2 = document.getElementById('dash-kritis');
    if (el2) el2.textContent = kritis;
  });

  setTimeout(() => {
    const canvas = document.getElementById('chartKunjungan');
    if (!canvas) return;
    new Chart(canvas, {
      type: 'bar',
      data: {
        labels: ['Sen','Sel','Rab','Kam','Jum','Sab','Min'],
        datasets: [{
          label: 'Pasien',
          data: [12,19,15,25,22,30,10],
          backgroundColor: 'rgba(17,156,159,0.15)',
          borderColor: '#119c9f',
          borderWidth: 2, borderRadius: 8
        }]
      },
      options: {
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'DM Sans', size: 11 } } },
          y: { grid: { color: 'rgba(127,185,192,0.1)' }, ticks: { font: { family: 'DM Sans', size: 11 } } }
        }
      }
    });
  }, 100);
}

// ===== PENDAFTARAN =====
function renderPendaftaran(el) {
  const today = new Date().toISOString().split('T')[0].replace(/-/g,'');
  const newNoRM = 'RM-' + today + '-' + Math.floor(1000 + Math.random() * 9000);
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:320px 1fr;gap:20px">
      <div class="card" style="height:fit-content">
        <div style="font-weight:700;font-size:16px;margin-bottom:20px;display:flex;align-items:center;gap:8px">
          <i class="fas fa-user-plus" style="color:var(--c-teal)"></i> Registrasi Pasien
        </div>
        <form id="form-pendaftaran">
          <div class="form-group">
            <label class="form-label">No. Rekam Medis</label>
            <input type="text" id="p-norm" class="form-input" value="${newNoRM}" readonly>
          </div>
          <div class="form-group">
            <label class="form-label">Nama Lengkap *</label>
            <input type="text" id="p-nama" class="form-input" placeholder="Nama pasien..." required>
          </div>
          <div class="form-group">
            <label class="form-label">NIK (16 Digit) *</label>
            <input type="number" id="p-nik" class="form-input" placeholder="3273xxxxxxxxxxxxxx" required>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="form-group">
              <label class="form-label">Jenis Kelamin</label>
              <select id="p-jk" class="form-input">
                <option value="L">Laki-laki</option>
                <option value="P">Perempuan</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Tgl Lahir *</label>
              <input type="date" id="p-tgl" class="form-input" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">WhatsApp *</label>
            <input type="number" id="p-wa" class="form-input" placeholder="628xxx" required>
          </div>
          <div class="form-group">
            <label class="form-label">Alamat</label>
            <textarea id="p-alamat" class="form-input" rows="2" style="resize:none"></textarea>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px">
            <button type="button" class="btn btn-ghost btn-full" onclick="submitPasien('MASTER')">
              <i class="fas fa-save"></i> Simpan Master
            </button>
            <button type="button" class="btn btn-primary btn-full" onclick="submitPasien('PERAWAT')">
              <i class="fas fa-paper-plane"></i> Daftar Kunjungan
            </button>
          </div>
        </form>
      </div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div style="font-weight:700;font-size:16px">Data Master Pasien</div>
          <div style="position:relative">
            <i class="fas fa-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--c-muted);font-size:12px"></i>
            <input type="text" id="search-pasien" onkeyup="filterPasien()" placeholder="Cari pasien..."
              style="padding:7px 14px 7px 32px;border-radius:8px;border:1.5px solid #dceef0;font-size:13px;outline:none;font-family:'DM Sans',sans-serif;background:#f8fbfb">
          </div>
        </div>
        <div style="overflow-x:auto">
          <table class="tbl" id="tbl-pasien-master-wrap">
            <thead><tr>
              <th>No RM</th><th>Nama</th><th>Alamat</th><th>WA</th><th>Aksi</th>
            </tr></thead>
            <tbody id="table-pasien-master"></tbody>
          </table>
        </div>
      </div>
    </div>
  `;
  onValue(ref(db, 'master_pasien'), snap => {
    const data = snap.val() || {};
    const rows = Object.entries(data).reverse().map(([id, p]) => `
      <tr>
        <td class="font-mono" style="color:var(--c-teal);font-weight:600">${p.norm}</td>
        <td style="font-weight:600">${p.nama}</td>
        <td style="color:var(--c-muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.alamat||'-'}</td>
        <td><a href="https://wa.me/${p.wa}" target="_blank" style="color:#22c55e;font-size:12px"><i class="fab fa-whatsapp"></i> ${p.wa}</a></td>
        <td><button onclick="daftarkanDariMaster('${id}')" class="btn btn-primary btn-sm">DAFTAR</button></td>
      </tr>
    `).join('');
    document.getElementById('table-pasien-master').innerHTML = rows || `<tr><td colspan="5" style="text-align:center;color:var(--c-muted);padding:24px">Belum ada data pasien</td></tr>`;
  });
}

window.filterPasien = () => {
  const val = document.getElementById('search-pasien').value.toLowerCase();
  document.querySelectorAll('#table-pasien-master tr').forEach(r => {
    r.style.display = r.textContent.toLowerCase().includes(val) ? '' : 'none';
  });
};

window.submitPasien = async (target) => {
  const payload = {
    norm: document.getElementById('p-norm').value,
    nama: document.getElementById('p-nama').value,
    nik: document.getElementById('p-nik').value,
    jk: document.getElementById('p-jk').value,
    tgl: document.getElementById('p-tgl').value,
    wa: document.getElementById('p-wa').value,
    alamat: document.getElementById('p-alamat').value,
    status: target, tgl_daftar: new Date().toISOString()
  };
  if (!payload.nama || !payload.nik || !payload.tgl) return toast('Lengkapi data wajib!', 'error');
  try {
    await push(ref(db, 'master_pasien'), payload);
    if (target === 'PERAWAT') await push(ref(db, 'pendaftaran'), payload);
    toast('Data berhasil disimpan!', 'success');
    renderModule('pendaftaran');
  } catch(err) { toast(err.message, 'error'); }
};

window.daftarkanDariMaster = async (id) => {
  const snap = await get(ref(db, `master_pasien/${id}`));
  const data = snap.val();
  data.status = 'PERAWAT';
  data.tgl_daftar = new Date().toISOString();
  await push(ref(db, 'pendaftaran'), data);
  toast(`${data.nama} didaftarkan ke perawat`, 'success');
};

// ===== PERAWAT =====
function renderPerawat(el) {
  el.innerHTML = `
    <div style="font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px">
      <i class="fas fa-stethoscope" style="color:var(--c-teal)"></i> Antrian Perawat (TTV)
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px" id="antrian-perawat"></div>
  `;
  onValue(ref(db, 'pendaftaran'), snap => {
    const data = snap.val() || {};
    const list = Object.entries(data).filter(([,p]) => p.status === 'PERAWAT');
    const c = document.getElementById('antrian-perawat');
    if (!c) return;

let currentResep = [], currentTindakan = [];

window.tambahItemResep = async () => {
  const el = document.getElementById('select-obat');
  const opt = el.selectedOptions[0];
  const id = el.value;
  const qty = parseInt(document.getElementById('qty-obat').value);
  if (!id || isNaN(qty) || qty <= 0) return toast('Pilih obat & masukkan jumlah', 'error');
  const stok = parseInt(opt.dataset.stok || 0);
  const harga = parseInt(opt.dataset.harga || 0);
  const ada = currentResep.find(i => i.id === id);
  const total = ada ? parseInt(ada.qty) + qty : qty;
  if (total > stok) return toast(`Stok tidak cukup! Sisa: ${stok}`, 'warning');
  currentResep.push({ id, nama: id, qty, harga });
  el.selectedIndex = 0; document.getElementById('qty-obat').value = '';
  renderResepList(); toast(`Ditambahkan ke resep`, 'success');
};
window.hapusResep = idx => { currentResep.splice(idx, 1); renderResepList(); };
function renderResepList() {
  const el = document.getElementById('resep-list');
  if (!el) return;
  el.innerHTML = currentResep.map((item, idx) => `
    <div class="resep-item"><span><b>${item.nama}</b> &times;${item.qty}</span>
    <button onclick="hapusResep(${idx})" class="btn btn-danger btn-sm" style="padding:4px 10px"><i class="fas fa-trash"></i></button></div>
  `).join('');
}

window.tambahItemTindakan = async () => {
  const el = document.getElementById('select-tindakan');
  const opt = el.selectedOptions[0];
  const id = el.value;
  if (!id) return toast('Pilih tindakan terlebih dahulu', 'error');
  currentTindakan.push({ id, nama: opt.dataset.nama, harga: parseInt(opt.dataset.harga || 0) });
  el.selectedIndex = 0; renderTindakanList(); toast('Tindakan ditambahkan', 'success');
};
window.hapusTindakan = idx => { currentTindakan.splice(idx, 1); renderTindakanList(); };
function renderTindakanList() {
  const el = document.getElementById('tindakan-list');
  if (!el) return;
  el.innerHTML = currentTindakan.map((item, idx) => `
    <div class="tindakan-item"><span><b>${item.nama}</b> — Rp ${item.harga?.toLocaleString()}</span>
    <button onclick="hapusTindakan(${idx})" class="btn btn-danger btn-sm" style="padding:4px 10px"><i class="fas fa-trash"></i></button></div>
  `).join('');
}

window.simpanPemeriksaanDokter = async (id) => {
  const anamnesa = document.getElementById('dr-anamnesa').value;
  const diagnosa = document.getElementById('dr-diagnosa').value;
  const isRad = document.getElementById('order-rad').checked;
  const isLab = document.getElementById('order-lab').checked;
  let total = 0;
  const masterObatSnap = await get(ref(db, 'master_obat'));
  const masterObat = masterObatSnap.val();
  currentResep.forEach(item => {
    for (let key in masterObat) {
      if (masterObat[key].nama === item.nama) {
        total += (masterObat[key].harga || 0) * item.qty;
        update(ref(db, `master_obat/${key}`), { stok: masterObat[key].stok - item.qty });
      }
    }
  });
  currentTindakan.forEach(item => { total += (item.harga || 0); });
  const nextStatus = isRad ? 'RADIOLOGI' : (isLab ? 'LAB' : 'FARMASI');
  await update(ref(db, `pendaftaran/${id}`), {
    anamnesa, diagnosa,
    resep: currentResep, tindakan: currentTindakan,
    pemeriksaan_rad: isRad ? document.getElementById('det-rad').value : null,
    pemeriksaan_lab: isLab ? document.getElementById('det-lab').value : null,
    status: nextStatus, waktu_dokter: new Date().toISOString(),
    total_bayar: total
  });
  toast('Resume medis tersimpan!', 'success');
  currentResep = []; currentTindakan = [];
  hideModal();
};

            <div style="font-weight:700;font-size:15px">${p.nama}</div>
            <div class="font-mono" style="font-size:11px;color:var(--c-muted);margin-bottom:8px">${p.norm}</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px">
              ${resep.length ? resep.map(r => `<span style="background:rgba(17,156,159,0.08);color:var(--c-teal);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600">${r.nama} (×${r.qty})</span>`).join('') : '<span style="color:var(--c-muted);font-size:12px;font-style:italic">Tidak ada resep</span>'}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <button onclick="updateStatus('${id}','KASIR','Obat selesai disiapkan')" class="btn btn-primary btn-sm">
              <i class="fas fa-check"></i> Proses & Selesai
            </button>
            <button onclick="kirimWA('${p.wa}','Halo ${p.nama}, obat Anda sedang disiapkan di Apotek.')" class="btn btn-success btn-sm">
              <i class="fab fa-whatsapp"></i> Notif WA
            </button>
          </div>
        </div>
      `;
    }).join('');
  });
}

// ===== KASIR =====
function renderKasir(el) {
  el.innerHTML = `
    <div style="font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px">
      <i class="fas fa-receipt" style="color:var(--c-teal)"></i> Billing & Pembayaran
    </div>
    <div class="card">
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr>
            <th>Pasien</th><th>Tindakan</th><th>Obat</th><th>Total Tagihan</th><th>Aksi</th>
          </tr></thead>
          <tbody id="table-kasir"></tbody>
        </table>
      </div>
    </div>
  `;
  onValue(ref(db, 'pendaftaran'), snap => {
    const data = snap.val() || {};
    const list = Object.entries(data).filter(([,p]) => p.status === 'KASIR');
    const tbody = document.getElementById('table-kasir');
    if (!tbody) return;
    tbody.innerHTML = list.length ? list.map(([id, p]) => `
      <tr>
        <td><div style="font-weight:700">${p.nama}</div><div class="font-mono" style="font-size:11px;color:var(--c-muted)">${p.norm}</div></td>
        <td>${p.tindakan?.length||0} tindakan</td>
        <td>${p.resep?.length||0} item</td>
        <td style="font-weight:700;color:var(--c-teal)">Rp ${(p.total_bayar||0).toLocaleString()}</td>
        <td><button onclick="prosesBayar('${id}',${p.total_bayar||0})" class="btn btn-success btn-sm"><i class="fas fa-check-circle"></i> Bayar & Cetak</button></td>
      </tr>
    `).join('') : `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--c-muted)">Tidak ada tagihan</td></tr>`;
  });
}

window.prosesBayar = async (id, total) => {
  const result = await Swal.fire({
    title: 'Konfirmasi Pembayaran',
    html: `Total: <strong style="color:var(--c-teal)">Rp ${total.toLocaleString()}</strong>`,
    icon: 'question',
    showCancelButton: true,
    confirmButtonColor: '#119c9f',
    cancelButtonColor: '#94a3b8',
    confirmButtonText: 'Proses Bayar',
    cancelButtonText: 'Batal'
  });
  if (!result.isConfirmed) return;

  const snap = await get(ref(db, `pendaftaran/${id}`));
  const data = snap.val();
  if (!data) return toast('Data tidak ditemukan!', 'error');

  toast('Mengunduh invoice...', 'success');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:[80,160] });

  doc.setFont('helvetica','bold');
  doc.setFontSize(13); doc.text('KLINIK PRATAMA', 40, 10, { align:'center' });
  doc.setFont('helvetica','normal');
  doc.setFontSize(8); doc.text('RS Mitra Plumbon', 40, 15, { align:'center' });
  doc.text('Jl. Mutiara Cempaka No. 06', 40, 19, { align:'center' });
  doc.setDrawColor(17,156,159); doc.setLineWidth(0.5); doc.line(5,22,75,22);

  const tgl = new Date().toLocaleString('id-ID',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  doc.setFontSize(8.5);
  doc.text(`Tgl   : ${tgl}`, 5, 27);
  doc.text(`No RM : ${data.norm}`, 5, 31);
  doc.text(`Pasien: ${data.nama}`, 5, 35);
  if (data.diagnosa) doc.text(`Dx    : ${data.diagnosa}`, 5, 39);
  doc.setDrawColor(200,200,200); doc.line(5,42,75,42);

  let y = 48;
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.text('Tindakan:', 5, y); y += 5;
  doc.setFont('helvetica','normal');
  (data.tindakan||[]).forEach((item,i) => {
    doc.text(`${i+1}. ${item.nama}`, 5, y);
    doc.text(`${(item.harga||0).toLocaleString()}`, 75, y, {align:'right'}); y += 5;
  });
  if (!(data.tindakan||[]).length) { doc.text('- Tidak ada tindakan', 5, y); y += 5; }

  y += 3;
  doc.setFont('helvetica','bold'); doc.text('Resep:', 5, y); y += 5;
  doc.setFont('helvetica','normal');
  (data.resep||[]).forEach((obat,i) => {
    const sub = (obat.harga||0) * (obat.qty||0);
    doc.text(`${i+1}. ${obat.nama} x${obat.qty}`, 5, y);
    doc.text(`${sub.toLocaleString()}`, 75, y, {align:'right'}); y += 5;
  });
  if (!(data.resep||[]).length) { doc.text('- Tidak ada resep', 5, y); y += 5; }

  doc.setDrawColor(17,156,159); doc.line(5,y+2,75,y+2); y += 8;
  doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('TOTAL BAYAR :', 5, y);
  doc.text(`Rp ${parseInt(total).toLocaleString('id-ID')}`, 75, y, {align:'right'});
  y += 14;
  doc.setFont('helvetica','italic'); doc.setFontSize(8);
  doc.text('Terima kasih atas kunjungan Anda', 40, y, {align:'center'});
  doc.text('Semoga lekas sembuh', 40, y+4, {align:'center'});

  doc.save(`Invoice_${data.nama.replace(/\s+/g,'_')}_${data.norm}.pdf`);
};

// ===== PENUNJANG =====
function renderPenunjang(el, type) {
  const labels = { radiologi: { label:'Unit Radiologi', icon:'fa-x-ray', color:'#3b82f6' }, lab: { label:'Unit Lab', icon:'fa-vials', color:'#7c3aed' } };
  const cfg = labels[type] || { label:type, icon:'fa-flask', color:'var(--c-teal)' };
  el.innerHTML = `
    <div style="font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px">
      <i class="fas ${cfg.icon}" style="color:${cfg.color}"></i> ${cfg.label}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px" id="antrian-penunjang"></div>
  `;
  onValue(ref(db, 'pendaftaran'), snap => {
    const data = snap.val() || {};
    const list = Object.entries(data).filter(([,p]) => p.status === type.toUpperCase());
    const c = document.getElementById('antrian-penunjang');
    if (!c) return;
    if (!list.length) {
      c.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--c-muted)"><i class="fas fa-check-circle" style="font-size:40px;display:block;margin-bottom:10px"></i>Tidak ada antrian</div>`;
      return;
    }
    c.innerHTML = list.map(([id, p]) => `
      <div class="patient-card fade-in" style="border-left:3px solid ${cfg.color}">
        <div style="font-weight:700;font-size:15px;margin-bottom:4px">${p.nama}</div>
        <div class="font-mono" style="font-size:11px;color:var(--c-muted);margin-bottom:10px">${p.norm}</div>
        <div style="background:#f8fbfb;border-radius:8px;padding:10px;font-size:12px;margin-bottom:12px;border:1px solid #dceef0">
          <div style="font-size:10px;font-weight:700;color:var(--c-muted);margin-bottom:4px">Permintaan:</div>
          ${type === 'radiologi' ? p.pemeriksaan_rad : p.pemeriksaan_lab}
        </div>
        <button onclick="updateStatus('${id}','FARMASI','Penunjang selesai')" class="btn btn-primary btn-full btn-sm">
          <i class="fas fa-check"></i> Input Hasil & Teruskan
        </button>
      </div>
    `).join('');
  });
}

// ===== MASTER TINDAKAN =====
async function renderMaster(el) {
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:300px 1fr;gap:20px">
      <div class="card" style="height:fit-content;position:sticky;top:0">
        <div style="font-weight:700;font-size:16px;margin-bottom:20px;display:flex;align-items:center;gap:8px" id="form-title">
          <i class="fas fa-hand-holding-medical" style="color:var(--c-teal)"></i> Tambah Tindakan
        </div>
        <form id="form-tindakan">
          <input type="hidden" id="t-id-lama">
          <div class="form-group"><label class="form-label">Kode Tindakan</label><input type="text" id="t-kode" class="form-input font-mono" placeholder="T001" required></div>
          <div class="form-group"><label class="form-label">Nama Tindakan</label><input type="text" id="t-nama" class="form-input" required></div>
          <div class="form-group"><label class="form-label">Harga (Rp)</label><input type="number" id="t-harga" class="form-input" required></div>
          <div style="display:flex;gap:8px;margin-top:16px">
            <button type="button" onclick="resetFormTindakan()" id="btn-cancel-tindakan" class="btn btn-ghost" style="display:none;flex:1">Batal</button>
            <button type="submit" id="btn-save-tindakan" class="btn btn-primary" style="flex:2">Simpan</button>
          </div>
        </form>
      </div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
          <div style="font-weight:700;font-size:16px">Daftar Tindakan</div>
          <div style="position:relative">
            <i class="fas fa-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--c-muted);font-size:12px"></i>
            <input type="text" id="search-tindakan" onkeyup="filterTindakan()" placeholder="Cari..."
              style="padding:7px 14px 7px 32px;border-radius:8px;border:1.5px solid #dceef0;font-size:13px;outline:none;font-family:'DM Sans',sans-serif;background:#f8fbfb">
          </div>
        </div>
        <div style="overflow-x:auto">
          <table class="tbl">
            <thead><tr><th>Kode</th><th>Nama</th><th>Harga</th><th style="text-align:center">Aksi</th></tr></thead>
            <tbody id="table-master-tindakan"></tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  document.getElementById('form-tindakan').onsubmit = async e => {
    e.preventDefault();
    const kode = document.getElementById('t-kode').value.toUpperCase().trim();
    const nama = document.getElementById('t-nama').value.trim();
    const harga = parseInt(document.getElementById('t-harga').value);
    const idLama = document.getElementById('t-id-lama').value;
    try {
      if (idLama && idLama !== kode) await remove(ref(db, `master_tindakan/${idLama}`));
      await set(ref(db, `master_tindakan/${kode}`), { nama, harga });
      toast('Disimpan!', 'success'); resetFormTindakan();
    } catch { toast('Gagal menyimpan', 'error'); }
  };

  onValue(ref(db, 'master_tindakan'), snap => {
    const data = snap.val() || {};
    const tbody = document.getElementById('table-master-tindakan');
    if (!tbody) return;
    tbody.innerHTML = Object.entries(data).map(([id,t]) => `
      <tr>
        <td class="font-mono" style="color:var(--c-teal);font-weight:600">${id}</td>
        <td style="font-weight:600">${t.nama}</td>
        <td>Rp ${t.harga?.toLocaleString()}</td>
        <td style="text-align:center">
          <div style="display:flex;gap:6px;justify-content:center">
            <button onclick="editTindakan('${id}','${t.nama}',${t.harga})" class="btn btn-ghost btn-sm"><i class="fas fa-edit" style="color:var(--c-orange)"></i></button>
            <button onclick="deleteTindakan('${id}')" class="btn btn-ghost btn-sm"><i class="fas fa-trash" style="color:#ef4444"></i></button>
          </div>
        </td>
      </tr>
    `).join('');
  });
}

window.resetFormTindakan = () => {
  document.getElementById('form-tindakan').reset();
  document.getElementById('t-id-lama').value = '';
  document.getElementById('form-title').innerHTML = '<i class="fas fa-hand-holding-medical" style="color:var(--c-teal)"></i> Tambah Tindakan';
  document.getElementById('btn-save-tindakan').textContent = 'Simpan';
  document.getElementById('btn-cancel-tindakan').style.display = 'none';
  document.getElementById('t-kode').disabled = false;
};
window.editTindakan = (id, nama, harga) => {
  document.getElementById('t-kode').value = id;
  document.getElementById('t-id-lama').value = id;
  document.getElementById('t-nama').value = nama;
  document.getElementById('t-harga').value = harga;
  document.getElementById('form-title').innerHTML = '<i class="fas fa-edit" style="color:var(--c-orange)"></i> Edit Tindakan';
  document.getElementById('btn-save-tindakan').textContent = 'Update';
  document.getElementById('btn-cancel-tindakan').style.display = '';
  document.getElementById('form-tindakan').scrollIntoView({ behavior:'smooth' });
};
window.deleteTindakan = id => {
  Swal.fire({ title:'Hapus?', text:`Kode ${id} akan dihapus permanen.`, icon:'warning',
    showCancelButton:true, confirmButtonColor:'#ef4444', cancelButtonColor:'#94a3b8',
    confirmButtonText:'Hapus', cancelButtonText:'Batal'
  }).then(async r => {
    if (r.isConfirmed) { await remove(ref(db, `master_tindakan/${id}`)); toast('Dihapus!', 'success'); }
  });
};
window.filterTindakan = () => {
  const val = document.getElementById('search-tindakan').value.toLowerCase();
  document.querySelectorAll('#table-master-tindakan tr').forEach(r => {
    r.style.display = r.textContent.toLowerCase().includes(val) ? '' : 'none';
  });
};

// ===== HELPERS =====
window.updateStatus = async (id, status, msg) => {
  await update(ref(db, `pendaftaran/${id}`), { status });
  toast(msg, 'success');
};

window.toast = (msg, type='success') => {
  const container = document.getElementById('toast-container');
  const div = document.createElement('div');
  const icons = { success:'fa-check', error:'fa-times', warning:'fa-exclamation' };
  div.className = `toast toast-${type}`;
  div.innerHTML = `<div class="toast-icon"><i class="fas ${icons[type]||'fa-info'}"></i></div><span>${msg}</span>`;
  container.appendChild(div);
  setTimeout(() => {
    div.style.animation = 'toastOut 0.3s ease forwards';
    setTimeout(() => div.remove(), 300);
  }, 3200);
};

window.showModal = content => {
  const container = document.getElementById('modal-container');
  document.getElementById('modal-body').innerHTML = `
    <button class="modal-close" onclick="hideModal()"><i class="fas fa-times"></i></button>${content}
  `;
  container.classList.add('show');
};
window.hideModal = () => document.getElementById('modal-container').classList.remove('show');

window.toggleDarkMode = () => {
  document.body.classList.toggle('dark');
  const icon = document.getElementById('dark-icon');
  icon.className = document.body.classList.contains('dark') ? 'fas fa-sun' : 'fas fa-moon';
};

window.toggleSidebar = () => {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const isOpen = sidebar.classList.contains('open');
  sidebar.classList.toggle('open', !isOpen);
  overlay.classList.toggle('show', !isOpen);
};

window.kirimWA = (no, text) => window.open(`https://wa.me/${no}?text=${encodeURIComponent(text)}`, '_blank');

function calculateAge(dob) {
  if (!dob) return '-';
  const diff = Date.now() - new Date(dob).getTime();
  return Math.abs(new Date(diff).getUTCFullYear() - 1970);
}

// Responsive sidebar
const mq = window.matchMedia('(min-width: 769px)');
const closeBtn = document.getElementById('sidebar-close-btn');
const menuBtn = document.getElementById('menu-btn');
function handleResize(e) {
  if (e.matches) {
    document.getElementById('sidebar').style.transform = '';
    document.getElementById('sidebar-overlay').classList.remove('show');
    if (closeBtn) closeBtn.style.display = 'none';
  } else {
    if (closeBtn) closeBtn.style.display = 'flex';
  }
}
mq.addEventListener('change', handleResize);
handleResize(mq);
</script>
</body>
</html>
