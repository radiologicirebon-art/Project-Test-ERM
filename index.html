<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>E-RM Klinik Pratama</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<style>

body{
background:#f3f4f6;
font-family:Arial;
}

.sidebar{
width:240px;
background:#0f172a;
color:white;
height:100vh;
position:fixed;
}

.sidebar a{
display:block;
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.1);
cursor:pointer;
}

.sidebar a:hover{
background:#1e293b;
}

.content{
margin-left:240px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>

</head>

<body>


<!-- LOGIN -->

<div id="loginPage" class="h-screen flex items-center justify-center bg-slate-900">

<div class="bg-white p-8 rounded-xl w-96 animate__animated animate__fadeIn">

<h1 class="text-2xl font-bold mb-6 text-center">
E-RM Klinik Pratama
</h1>

<input id="email" type="email" placeholder="Email" class="border w-full p-2 mb-3">

<input id="password" type="password" placeholder="Password" class="border w-full p-2 mb-4">

<button onclick="login()" class="bg-blue-600 text-white w-full p-2 rounded">
Login
</button>

</div>

</div>



<!-- APP -->

<div id="app" style="display:none">

<div class="sidebar">

<h2 class="text-xl p-4 font-bold">E-RM Klinik</h2>

<a onclick="openMenu('dashboard')">Dashboard</a>
<a onclick="openMenu('pendaftaran')">Pendaftaran</a>
<a onclick="openMenu('perawat')">Perawat</a>
<a onclick="openMenu('dokter')">Dokter</a>
<a onclick="openMenu('radiologi')">Radiologi</a>
<a onclick="openMenu('lab')">Lab</a>
<a onclick="openMenu('farmasi')">Farmasi</a>
<a onclick="openMenu('gudang')">Gudang</a>
<a onclick="openMenu('kasir')">Kasir</a>
<a onclick="openMenu('admin')">Admin</a>

<a onclick="logout()">Logout</a>

</div>


<div class="content">

<div id="dashboard">

<h1 class="text-3xl font-bold mb-6">Dashboard Klinik</h1>

<div class="grid grid-cols-4 gap-4">

<div class="card">
Pasien Hari Ini
<h1 class="text-3xl font-bold">0</h1>
</div>

<div class="card">
Radiologi
<h1 class="text-3xl font-bold">0</h1>
</div>

<div class="card">
Lab
<h1 class="text-3xl font-bold">0</h1>
</div>

<div class="card">
Farmasi
<h1 class="text-3xl font-bold">0</h1>
</div>

</div>

</div>

<div id="pendaftaran" style="display:none">Modul Pendaftaran</div>
<div id="perawat" style="display:none">Modul Perawat</div>
<div id="dokter" style="display:none">Modul Dokter</div>
<div id="radiologi" style="display:none">Radiologi</div>
<div id="lab" style="display:none">Lab</div>
<div id="farmasi" style="display:none">Farmasi</div>
<div id="gudang" style="display:none">Gudang</div>
<div id="kasir" style="display:none">Kasir</div>
<div id="admin" style="display:none">Admin</div>

</div>

</div>



<script>

const firebaseConfig = {

apiKey: "AIzaSyBx1cYtGcnppOhMmhH0wOXqwGFWLiGM7kk",

authDomain: "develop-212.firebaseapp.com",

databaseURL: "https://develop-212-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId: "develop-212",

storageBucket: "develop-212.firebasestorage.app",

messagingSenderId: "79717438597",

appId: "1:79717438597:web:e28c0be0c64667891ec5ec"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();



function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

auth.signInWithEmailAndPassword(email,password)

.then(function(user){

document.getElementById("loginPage").style.display="none"
document.getElementById("app").style.display="block"

loadUserRole(user.user.email)

})

.catch(function(error){

alert(error.message)

})

}



function logout(){

auth.signOut()
location.reload()

}



function openMenu(menu){

var pages=document.querySelectorAll(".content > div")

pages.forEach(function(el){

el.style.display="none"

})

document.getElementById(menu).style.display="block"

}



var currentRole=""



function loadUserRole(email){

db.ref("users").once("value")

.then(function(snapshot){

var data=snapshot.val()

for(var id in data){

if(data[id].email==email){

currentRole=data[id].role
applyRole()

}

}

})

}



function applyRole(){

var role=currentRole

var menuRole={

pendaftaran:["pendaftaran"],
perawat:["perawat"],
dokter:["dokter"],
radiologi:["radiologi"],
lab:["lab"],
farmasi:["farmasi"],
gudang:["gudang"],
kasir:["kasir"],
admin:["dashboard","pendaftaran","perawat","dokter","radiologi","lab","farmasi","gudang","kasir","admin"]

}

var allowed=menuRole[role]

var links=document.querySelectorAll(".sidebar a")

links.forEach(function(link){

var text=link.innerText.toLowerCase()

if(text=="logout") return

if(!allowed.includes(text)){

link.style.display="none"

}

})

}

</script>

</body>
</html>
