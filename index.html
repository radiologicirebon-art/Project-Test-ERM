<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SUPER ERM KLINIK PRATAMA</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<style>

body{
background:#f3f4f6;
font-family:Arial;
}

.sidebar{
width:240px;
background:#0f172a;
color:white;
height:100vh;
position:fixed;
}

.sidebar a{
display:block;
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.1);
cursor:pointer;
}

.sidebar a:hover{
background:#1e293b;
}

.content{
margin-left:240px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
border:1px solid #ccc;
padding:6px;
width:100%;
}

</style>

</head>

<body>


<!-- LOGIN -->

<div id="loginPage" class="h-screen flex items-center justify-center bg-slate-900">

<div class="bg-white p-8 rounded-xl w-96">

<h1 class="text-2xl font-bold mb-6 text-center">
E-RM Klinik Pratama
</h1>

<input id="email" type="email" placeholder="Email">

<br><br>

<input id="password" type="password" placeholder="Password">

<br><br>

<button onclick="login()" class="bg-blue-600 text-white w-full p-2 rounded">
Login
</button>

</div>

</div>



<!-- APP -->

<div id="app" style="display:none">

<div class="sidebar">

<h2 class="text-xl p-4 font-bold">E-RM Klinik</h2>

<a onclick="openMenu('dashboard')">Dashboard</a>
<a onclick="openMenu('pendaftaran')">Pendaftaran</a>
<a onclick="openMenu('perawat')">Perawat</a>
<a onclick="openMenu('dokter')">Dokter</a>

<a onclick="logout()">Logout</a>

</div>


<div class="content">


<!-- DASHBOARD -->

<div id="dashboard">

<h1 class="text-3xl font-bold mb-6">Dashboard</h1>

<div class="grid grid-cols-3 gap-4">

<div class="card">
Pasien Hari Ini
<h1 id="jumlahPasien" class="text-3xl font-bold">0</h1>
</div>

<div class="card">
Antrian Perawat
<h1 id="jumlahPerawat" class="text-3xl font-bold">0</h1>
</div>

<div class="card">
Antrian Dokter
<h1 id="jumlahDokter" class="text-3xl font-bold">0</h1>
</div>

</div>

</div>



<!-- PENDAFTARAN -->

<div id="pendaftaran" style="display:none">

<h1 class="text-2xl font-bold mb-4">Pendaftaran Pasien</h1>

<div class="grid grid-cols-2 gap-3">

<input id="nama" placeholder="Nama Pasien">
<input id="nik" placeholder="NIK">

<select id="jk">
<option>Jenis Kelamin</option>
<option>Laki-Laki</option>
<option>Perempuan</option>
</select>

<input id="tgl" type="date">

<input id="alamat" placeholder="Alamat">
<input id="hp" placeholder="No HP / WhatsApp">

</div>

<br>

<button onclick="simpanPasien()" class="bg-green-600 text-white px-4 py-2 rounded">
Simpan Pasien
</button>

<button onclick="simpanDaftar()" class="bg-blue-600 text-white px-4 py-2 rounded">
Simpan + Daftar
</button>

<hr class="my-6">

<h2 class="text-xl font-bold mb-2">Master Pasien</h2>

<table class="w-full border">

<thead class="bg-gray-200">

<tr>
<th>No RM</th>
<th>Nama</th>
<th>NIK</th>
<th>JK</th>
<th>HP</th>
</tr>

</thead>

<tbody id="tabelPasien"></tbody>

</table>

</div>



<!-- PERAWAT -->

<div id="perawat" style="display:none">

<h1 class="text-2xl font-bold mb-4">Antrian Perawat</h1>

<table class="w-full border">

<thead class="bg-gray-200">

<tr>
<th>No RM</th>
<th>Nama</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="tabelPerawat"></tbody>

</table>

<hr class="my-6">

<h2 class="text-xl font-bold">TTV</h2>

<input id="td" placeholder="Tekanan Darah">
<input id="nadi" placeholder="Nadi">
<input id="suhu" placeholder="Suhu">
<input id="rr" placeholder="Respirasi">

<br><br>

<button onclick="simpanTTV()" class="bg-blue-600 text-white px-4 py-2 rounded">
Simpan TTV
</button>

</div>



<!-- DOKTER -->

<div id="dokter" style="display:none">

<h1 class="text-2xl font-bold">Antrian Dokter</h1>

<table class="w-full border">

<thead class="bg-gray-200">

<tr>
<th>No RM</th>
<th>Nama</th>
</tr>

</thead>

<tbody id="tabelDokter"></tbody>

</table>

</div>



</div>

</div>



<script>

const firebaseConfig = {

apiKey:"AIzaSyBx1cYtGcnppOhMmhH0wOXqwGFWLiGM7kk",

authDomain:"develop-212.firebaseapp.com",

databaseURL:"https://develop-212-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"develop-212",

storageBucket:"develop-212.firebasestorage.app",

messagingSenderId:"79717438597",

appId:"1:79717438597:web:e28c0be0c64667891ec5ec"

};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.database();



function login(){

var email=document.getElementById("email").value
var pass=document.getElementById("password").value

auth.signInWithEmailAndPassword(email,pass)

.then(function(){

document.getElementById("loginPage").style.display="none"
document.getElementById("app").style.display="block"

})

.catch(function(e){

alert(e.message)

})

}



function logout(){

auth.signOut()
location.reload()

}



function openMenu(menu){

var pages=document.querySelectorAll(".content > div")

pages.forEach(function(el){

el.style.display="none"

})

document.getElementById(menu).style.display="block"

}



function generateRM(){

return "RM"+Date.now()

}



function simpanPasien(){

var rm=generateRM()

var data={

rm:rm,
nama:nama.value,
nik:nik.value,
jk:jk.value,
tgl:tgl.value,
alamat:alamat.value,
hp:hp.value

}

db.ref("pasien/"+rm).set(data)

alert("Pasien disimpan")

}



function simpanDaftar(){

var rm=generateRM()

var data={

rm:rm,
nama:nama.value,
nik:nik.value,
jk:jk.value,
tgl:tgl.value,
alamat:alamat.value,
hp:hp.value

}

db.ref("pasien/"+rm).set(data)

db.ref("antrian_perawat/"+rm).set(data)

}



function loadPasien(){

db.ref("pasien").on("value",function(s){

var data=s.val()

var html=""

for(var i in data){

html+="<tr>"
html+="<td>"+data[i].rm+"</td>"
html+="<td>"+data[i].nama+"</td>"
html+="<td>"+data[i].nik+"</td>"
html+="<td>"+data[i].jk+"</td>"
html+="<td>"+data[i].hp+"</td>"
html+="</tr>"

}

tabelPasien.innerHTML=html

})

}



var selectedRM=""


function loadPerawat(){

db.ref("antrian_perawat").on("value",function(s){

var data=s.val()

var html=""

for(var i in data){

html+="<tr>"

html+="<td>"+data[i].rm+"</td>"
html+="<td>"+data[i].nama+"</td>"

html+="<td><button onclick='pilihPasien(\""+data[i].rm+"\")'>Pilih</button></td>"

html+="</tr>"

}

tabelPerawat.innerHTML=html

})

}



function pilihPasien(rm){

selectedRM=rm

alert("Pasien dipilih: "+rm)

}



function simpanTTV(){

var ttv={

td:td.value,
nadi:nadi.value,
suhu:suhu.value,
rr:rr.value

}

db.ref("ttv/"+selectedRM).set(ttv)

db.ref("antrian_dokter/"+selectedRM).set(ttv)

db.ref("antrian_perawat/"+selectedRM).remove()

alert("TTV disimpan dan masuk antrian dokter")

}



function loadDokter(){

db.ref("antrian_dokter").on("value",function(s){

var data=s.val()

var html=""

for(var i in data){

html+="<tr>"
html+="<td>"+i+"</td>"
html+="<td>-</td>"
html+="</tr>"

}

tabelDokter.innerHTML=html

})

}



loadPasien()
loadPerawat()
loadDokter()

</script>

</body>
</html>
