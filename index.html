<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-RM KLINIK PRATAMA PRO v1.2 | RS MITRA PLUMBON</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #4f46e5;
            --secondary: #6366f1;
            --dark-bg: #0f172a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            scroll-behavior: smooth;
        }

        /* UI Enhancements */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .dark .glass-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(71, 85, 105, 0.3);
        }

        .sidebar-link {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-link.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            transform: scale(1.02);
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Loading Animation */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 9999; display: flex; align-items: center; justify-content: center;
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-300">

    <div id="loader">
        <div class="flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 font-bold text-indigo-900 animate-pulse">Memuat Sistem E-RM...</p>
        </div>
    </div>

    <div id="toast-box" class="fixed top-5 right-5 z-[9999] flex flex-col gap-3"></div>

    <div id="app" class="hidden flex h-screen overflow-hidden">
        
        <aside class="w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col z-40 transition-all duration-300 shadow-2xl">
            <div class="p-8">
                <div class="flex items-center gap-3">
                    <div class="h-10 w-10 bg-gradient-to-tr from-indigo-600 to-blue-500 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <i class="fas fa-hospital-user text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-extrabold text-xl tracking-tight text-slate-800 dark:text-white leading-none">PRO v1.2</h1>
                        <span class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest">E-RM PLATINUM</span>
                    </div>
                </div>
            </div>

            <nav id="menu-list" class="flex-1 px-4 py-2 space-y-1 overflow-y-auto custom-scroll">
                </nav>

            <div class="p-6 border-t border-slate-100 dark:border-slate-800">
                <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-2xl flex items-center gap-3 mb-4">
                    <div id="user-avatar" class="h-10 w-10 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-lg shadow-inner">?</div>
                    <div class="overflow-hidden">
                        <p id="user-name" class="text-sm font-bold truncate text-slate-800 dark:text-white">User Name</p>
                        <p id="user-role" class="text-[10px] uppercase font-bold text-indigo-500 tracking-wider">Role</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full py-3 px-4 rounded-xl text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/20 font-bold text-sm transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> Keluar Sistem
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-50 dark:bg-slate-950 overflow-hidden relative">
            
            <header class="h-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-10 flex items-center justify-between z-30">
                <div>
                    <h2 id="view-title" class="text-2xl font-extrabold text-slate-800 dark:text-white">Dashboard</h2>
                    <p id="view-subtitle" class="text-sm text-slate-400 font-medium italic">Klinik Pratama RS Mitra Plumbon</p>
                </div>

                <div class="flex items-center gap-6">
                    <div class="hidden lg:flex flex-col items-end">
                        <span id="digital-clock" class="text-lg font-bold text-slate-700 dark:text-slate-200">00:00:00</span>
                        <span id="date-label" class="text-xs text-slate-400 font-medium">Memuat tanggal...</span>
                    </div>
                    <button onclick="toggleDarkMode()" class="h-11 w-11 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-yellow-400 hover:scale-110 transition-transform">
                        <i class="fas fa-moon dark:hidden"></i>
                        <i class="fas fa-sun hidden dark:block"></i>
                    </button>
                    <div class="h-10 w-10 rounded-xl bg-green-50 text-green-600 flex items-center justify-center animate-pulse">
                        <i class="fas fa-signal"></i>
                    </div>
                </div>
            </header>

            <div id="main-view" class="flex-1 overflow-y-auto p-10 custom-scroll animate__animated animate__fadeIn">
                </div>

            <footer class="h-8 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 px-6 flex items-center justify-between text-[10px] text-slate-400 font-medium uppercase tracking-widest">
                <span>System Health: Optimal</span>
                <span>Database: Firebase RTDB - Connected</span>
                <span>&copy; 2026 Developed for RS Mitra Plumbon</span>
            </footer>
        </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[100] bg-slate-950/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white dark:bg-slate-900 w-full max-w-5xl max-h-[90vh] rounded-3xl shadow-2xl overflow-y-auto custom-scroll relative p-10 animate__animated animate__zoomIn">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get, push, onValue, update, remove, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyBx1cYtGcnppOhMmhH0wOXqwGFWLiGM7kk",
            authDomain: "develop-212.firebaseapp.com",
            databaseURL: "https://develop-212-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "develop-212",
            storageBucket: "develop-212.firebasestorage.app",
            messagingSenderId: "79717438597",
            appId: "1:79717438597:web:e28c0be0c64667891ec5ec",
            measurementId: "G-7EDQWV1HV7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // GLOBAL STATE
        let activeUser = null;
        let userData = null;

        const roleAccess = {
            'admin': ['dashboard', 'pendaftaran', 'perawat', 'dokter', 'radiologi', 'lab', 'farmasi', 'gudang', 'kasir', 'master-user'],
            'pendaftaran': ['dashboard', 'pendaftaran'],
            'perawat': ['dashboard', 'perawat'],
            'dokter': ['dashboard', 'dokter'],
            'farmasi': ['dashboard', 'farmasi', 'gudang'],
            'kasir': ['dashboard', 'kasir']
        };

        // --- AUTH SYSTEM ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, `users/${user.uid}`));
                userData = snap.val() || { role: 'admin', name: user.email.split('@')[0] };
                activeUser = user;
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                setupUI();
            } else {
                showLogin();
                document.getElementById('loader').classList.add('hidden');
            }
        });

        window.logout = () => {
            Swal.fire({
                title: 'Keluar?', text: "Anda akan keluar dari sesi ini.", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#4f46e5', cancelButtonColor: '#f43f5e'
            }).then((result) => { if (result.isConfirmed) signOut(auth); });
        };

        // --- UI SYSTEM ---
        function setupUI() {
            document.getElementById('user-name').innerText = userData.name;
            document.getElementById('user-role').innerText = userData.role;
            document.getElementById('user-avatar').innerText = userData.name.charAt(0).toUpperCase();
            
            renderSidebar();
            loadModule('dashboard');
            startClock();
        }

        function renderSidebar() {
            const container = document.getElementById('menu-list');
            container.innerHTML = '';
            
            const modules = [
                { id: 'dashboard', icon: 'fa-grid-2', label: 'Dashboard' },
                { id: 'pendaftaran', icon: 'fa-id-card', label: 'Pendaftaran' },
                { id: 'perawat', icon: 'fa-stethoscope', label: 'Unit Perawat' },
                { id: 'dokter', icon: 'fa-user-md', label: 'Unit Dokter' },
                { id: 'radiologi', icon: 'fa-x-ray', label: 'Radiologi' },
                { id: 'lab', icon: 'fa-microscope', label: 'Laboratorium' },
                { id: 'farmasi', icon: 'fa-pills', label: 'Farmasi' },
                { id: 'gudang', icon: 'fa-warehouse', label: 'Gudang' },
                { id: 'kasir', icon: 'fa-file-invoice-dollar', label: 'Kasir & Billing' }
            ];

            const userMods = roleAccess[userData.role] || ['dashboard'];
            
            modules.forEach(m => {
                if(userMods.includes(m.id)) {
                    const btn = document.createElement('div');
                    btn.className = `sidebar-link group flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer font-bold text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-white transition-all`;
                    btn.innerHTML = `<i class="fas ${m.icon} text-lg"></i> <span class="text-sm">${m.label}</span>`;
                    btn.onclick = () => {
                        document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
                        btn.classList.add('active');
                        loadModule(m.id);
                    };
                    if(m.id === 'dashboard') btn.classList.add('active');
                    container.appendChild(btn);
                }
            });
        }

        async function loadModule(id) {
            const display = document.getElementById('main-view');
            document.getElementById('view-title').innerText = id.charAt(0).toUpperCase() + id.slice(1);
            display.innerHTML = '<div class="flex items-center justify-center h-full"><div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div></div>';

            switch(id) {
                case 'dashboard': renderDashboard(display); break;
                case 'pendaftaran': renderPendaftaran(display); break;
                case 'perawat': renderPerawat(display); break;
                case 'dokter': renderDokter(display); break;
                case 'gudang': renderGudang(display); break;
                case 'farmasi': renderFarmasi(display); break;
                case 'kasir': renderKasir(display); break;
                case 'radiologi': renderPenunjang(display, 'RADIOLOGI'); break;
                case 'lab': renderPenunjang(display, 'LAB'); break;
                default: display.innerHTML = 'Module Not Found';
            }
        }

        // --- DASHBOARD MODULE ---
        async function renderDashboard(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 mb-10">
                    <div class="glass-card p-8 rounded-[2rem] border-b-4 border-indigo-500">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Total Pasien Hari Ini</p>
                        <h3 class="text-4xl font-extrabold mt-2 text-slate-800 dark:text-white" id="dash-total">0</h3>
                        <div class="mt-4 flex items-center gap-2 text-xs font-bold text-green-500"><i class="fas fa-arrow-up"></i> 12% vs Kemarin</div>
                    </div>
                    <div class="glass-card p-8 rounded-[2rem] border-b-4 border-emerald-500">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Selesai Layanan</p>
                        <h3 class="text-4xl font-extrabold mt-2 text-slate-800 dark:text-white" id="dash-done">0</h3>
                        <div class="mt-4 flex items-center gap-2 text-xs font-bold text-slate-400">Efisiensi: 94%</div>
                    </div>
                    <div class="glass-card p-8 rounded-[2rem] border-b-4 border-amber-500">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Antrian Aktif</p>
                        <h3 class="text-4xl font-extrabold mt-2 text-slate-800 dark:text-white" id="dash-active">0</h3>
                        <div class="mt-4 flex items-center gap-2 text-xs font-bold text-amber-500 animate-pulse"><i class="fas fa-clock"></i> Sedang Berjalan</div>
                    </div>
                    <div class="glass-card p-8 rounded-[2rem] border-b-4 border-rose-500">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Revenue (IDR)</p>
                        <h3 class="text-3xl font-extrabold mt-2 text-slate-800 dark:text-white" id="dash-rev">0</h3>
                        <div class="mt-4 flex items-center gap-2 text-xs font-bold text-slate-400">Real-time update</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 glass-card p-10 rounded-[2rem]">
                        <div class="flex justify-between items-center mb-8">
                            <h4 class="text-xl font-extrabold">Statistik Kunjungan Pasien</h4>
                            <select class="bg-slate-100 dark:bg-slate-800 px-4 py-2 rounded-xl text-sm font-bold border-none outline-none">
                                <option>7 Hari Terakhir</option>
                                <option>30 Hari Terakhir</option>
                            </select>
                        </div>
                        <div class="h-80"><canvas id="mainChart"></canvas></div>
                    </div>
                    <div class="glass-card p-10 rounded-[2rem]">
                        <h4 class="text-xl font-extrabold mb-8">Log Aktivitas Terbaru</h4>
                        <div id="recent-logs" class="space-y-6">
                            </div>
                    </div>
                </div>
            `;

            // Data Fetching for Dashboard
            onValue(ref(db, 'pendaftaran'), (snap) => {
                const data = snap.val() || {};
                const list = Object.values(data);
                document.getElementById('dash-total').innerText = list.length;
                document.getElementById('dash-done').innerText = list.filter(p => p.status === 'SELESAI').length;
                document.getElementById('dash-active').innerText = list.filter(p => p.status !== 'SELESAI').length;
                
                const revenue = list.filter(p => p.total_bayar).reduce((sum, p) => sum + p.total_bayar, 0);
                document.getElementById('dash-rev').innerText = revenue.toLocaleString();
            });

            // Init Chart
            new Chart(document.getElementById('mainChart'), {
                type: 'bar',
                data: {
                    labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
                    datasets: [{
                        label: 'Pasien',
                        data: [65, 59, 80, 81, 56, 55, 40],
                        backgroundColor: '#6366f1',
                        borderRadius: 12
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        // --- PENDAFTARAN MODULE ---
        function renderPendaftaran(el) {
            const tgl = new Date().toISOString().split('T')[0].replace(/-/g, '');
            const newNoRM = `RM-${tgl}-${Math.floor(Math.random() * 9999).toString().padStart(4, '0')}`;

            el.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-10">
                    <div class="w-full lg:w-1/3 glass-card p-10 rounded-[2.5rem] h-fit">
                        <div class="mb-8 text-center">
                            <div class="h-20 w-20 bg-indigo-100 text-indigo-600 rounded-3xl mx-auto flex items-center justify-center text-3xl mb-4">
                                <i class="fas fa-user-plus"></i>
                            </div>
                            <h3 class="text-2xl font-extrabold">Pasien Baru</h3>
                            <p class="text-sm text-slate-400">Isi data sesuai kartu identitas</p>
                        </div>
                        
                        <form id="form-pasien" class="space-y-5">
                            <div class="space-y-1">
                                <label class="text-[10px] font-extrabold uppercase text-slate-400 ml-2">Nomor RM Otomatis</label>
                                <input type="text" id="reg-norm" value="${newNoRM}" class="w-full bg-slate-50 dark:bg-slate-800/50 p-4 rounded-2xl border-none font-mono font-extrabold text-indigo-600 text-lg shadow-inner" readonly>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-extrabold uppercase text-slate-400 ml-2">Nama Lengkap Pasien</label>
                                <input type="text" id="reg-nama" class="w-full bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-200 dark:border-slate-700 font-bold outline-none focus:ring-2 ring-indigo-500 transition-all" placeholder="Contoh: John Doe" required>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-extrabold uppercase text-slate-400 ml-2">NIK</label>
                                    <input type="number" id="reg-nik" class="w-full bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-200 dark:border-slate-700 font-bold outline-none" placeholder="16 Digit">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-extrabold uppercase text-slate-400 ml-2">Tgl Lahir</label>
                                    <input type="date" id="reg-tgl" class="w-full bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-200 dark:border-slate-700 font-bold outline-none" required>
                                </div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-extrabold uppercase text-slate-400 ml-2">No. WhatsApp Aktif</label>
                                <input type="number" id="reg-wa" class="w-full bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-200 dark:border-slate-700 font-bold outline-none" placeholder="628xxxxxx" required>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-extrabold uppercase text-slate-400 ml-2">Alamat Domisili</label>
                                <textarea id="reg-alamat" class="w-full bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-200 dark:border-slate-700 font-bold outline-none resize-none" rows="3"></textarea>
                            </div>
                            
                            <div class="flex flex-col gap-3 pt-4">
                                <button type="button" onclick="submitRegistration('MASTER')" class="w-full py-4 rounded-2xl font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 transition-all">Simpan Master Saja</button>
                                <button type="button" onclick="submitRegistration('PERAWAT')" class="w-full py-4 rounded-2xl font-bold bg-indigo-600 text-white shadow-xl shadow-indigo-200 dark:shadow-none hover:bg-indigo-700 transition-all active:scale-95">Daftarkan Antrian <i class="fas fa-paper-plane ml-2"></i></button>
                            </div>
                        </form>
                    </div>

                    <div class="flex-1 space-y-8">
                        <div class="glass-card p-10 rounded-[2.5rem]">
                            <div class="flex justify-between items-center mb-8">
                                <h3 class="text-xl font-extrabold">Master Pasien Klinik</h3>
                                <div class="relative">
                                    <i class="fas fa-search absolute left-4 top-4 text-slate-300"></i>
                                    <input type="text" id="search-pasien" onkeyup="filterPasien(this.value)" class="pl-12 pr-6 py-3 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none outline-none font-bold text-sm w-64" placeholder="Cari No.RM / Nama...">
                                </div>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead class="text-[10px] font-extrabold uppercase text-slate-400 border-b border-slate-100 dark:border-slate-800">
                                        <tr>
                                            <th class="pb-4">No. RM</th>
                                            <th class="pb-4">Pasien</th>
                                            <th class="pb-4">Kontak</th>
                                            <th class="pb-4 text-right">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody id="master-pasien-list" class="text-sm font-bold divide-y divide-slate-50 dark:divide-slate-800">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Listen to master_pasien
            onValue(ref(db, 'master_pasien'), (snap) => {
                const data = snap.val() || {};
                const list = Object.entries(data);
                const tbody = document.getElementById('master-pasien-list');
                tbody.innerHTML = list.reverse().map(([id, p]) => `
                    <tr>
                        <td class="py-5 font-mono text-indigo-600">${p.norm}</td>
                        <td class="py-5">
                            <p>${p.nama}</p>
                            <span class="text-[10px] text-slate-400 uppercase">${p.nik || 'No NIK'}</span>
                        </td>
                        <td class="py-5">
                            <a href="https://wa.me/${p.wa}" target="_blank" class="text-green-500 hover:underline"><i class="fab fa-whatsapp"></i> ${p.wa}</a>
                        </td>
                        <td class="py-5 text-right">
                            <button onclick="daftarkanKunjungan('${id}')" class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-xs hover:bg-indigo-600 hover:text-white transition-all">Daftar Baru</button>
                        </td>
                    </tr>
                `).join('');
            });
        }

        window.submitRegistration = async (target) => {
            const p = {
                norm: document.getElementById('reg-norm').value,
                nama: document.getElementById('reg-nama').value,
                nik: document.getElementById('reg-nik').value,
                tgl: document.getElementById('reg-tgl').value,
                wa: document.getElementById('reg-wa').value,
                alamat: document.getElementById('reg-alamat').value,
                status: target,
                timestamp: new Date().toISOString()
            };

            try {
                await push(ref(db, 'master_pasien'), p);

                                    <th class="pb-4">Layanan</th>
                                    <th class="pb-4">Item Obat</th>
                                    <th class="pb-4">Total Tagihan</th>
                                    <th class="pb-4 text-right">Pembayaran</th>
                                </tr>
                            </thead>
                            <tbody id="billing-list" class="divide-y divide-slate-50 text-sm font-bold"></tbody>
                        </table>
                    </div>
                </div>
            `;

            onValue(ref(db, 'pendaftaran'), (snap) => {
                const list = Object.entries(snap.val() || {}).filter(([id, p]) => p.status === 'KASIR');
                document.getElementById('billing-list').innerHTML = list.map(([id, p]) => {
                    const totalJasa = 50000;
                    const totalObat = (p.resep || []).length * 15000; // Contoh kalkulasi
                    const total = totalJasa + totalObat;
                    return `
                        <tr>
                            <td class="py-6">
                                <p>${p.nama}</p>
                                <span class="text-[10px] text-indigo-500 font-mono">${p.norm}</span>
                            </td>
                            <td class="py-6">Konsultasi Dokter Umum</td>
                            <td class="py-6">${(p.resep || []).length} Item</td>
                            <td class="py-6 text-indigo-600">IDR ${total.toLocaleString()}</td>
                            <td class="py-6 text-right">
                                <button onclick="checkoutPayment('${id}', ${total})" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl text-xs shadow-lg shadow-indigo-100">Proses Bayar</button>
                            </td>
                        </tr>
                    `;
                }).join('');
            });
        }

        window.checkoutPayment = async (id, total) => {
            const { isConfirmed } = await Swal.fire({
                title: 'Konfirmasi Bayar',
                text: `Total Tagihan: IDR ${total.toLocaleString()}`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#4f46e5',
                confirmButtonText: 'Terima Uang & Selesai'
            });

            if(isConfirmed) {
                await update(ref(db, `pendaftaran/${id}`), { status: 'SELESAI', total_bayar: total });
                toast("Pembayaran Selesai! Mengunduh struk...", "success");
            }
        };

        // --- UTILITIES & HELPERS ---
        window.toast = (msg, type) => {
            const box = document.getElementById('toast-box');
            const div = document.createElement('div');
            div.className = `p-5 rounded-2xl shadow-2xl flex items-center gap-4 animate__animated animate__fadeInRight text-white font-bold ${type === 'success' ? 'bg-indigo-600' : 'bg-rose-600'}`;
            div.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'} text-2xl"></i> <div><p class="text-xs opacity-80 uppercase tracking-tighter">System Alert</p><p class="text-sm">${msg}</p></div>`;
            box.appendChild(div);
            setTimeout(() => {
                div.classList.replace('animate__fadeInRight', 'animate__fadeOutRight');
                setTimeout(() => div.remove(), 500);
            }, 4000);
        };

        window.showGlobalModal = (html) => {
            document.getElementById('modal-content').innerHTML = `
                <button onclick="closeGlobalModal()" class="absolute top-8 right-8 h-10 w-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:bg-rose-50 hover:text-rose-500 transition-all"><i class="fas fa-times"></i></button>
                ${html}
            `;
            document.getElementById('modal').classList.remove('hidden');
        };

        window.closeGlobalModal = () => document.getElementById('modal').classList.add('hidden');

        window.toggleDarkMode = () => document.documentElement.classList.toggle('dark');

        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('digital-clock').innerText = now.toLocaleTimeString('id-ID');
                document.getElementById('date-label').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            }, 1000);
        }

        // --- AUTH FOR DEV ---
        function showLogin() {
            document.body.innerHTML = `
                <div class="fixed inset-0 bg-indigo-900 flex items-center justify-center">
                    <div class="bg-white p-12 rounded-[3rem] w-full max-w-md shadow-2xl animate__animated animate__zoomIn">
                        <div class="text-center mb-10">
                            <div class="h-20 w-20 bg-indigo-100 text-indigo-600 rounded-3xl flex items-center justify-center text-3xl mx-auto mb-6"><i class="fas fa-hospital-symbol"></i></div>
                            <h2 class="text-3xl font-extrabold text-slate-800">E-RM PRO</h2>
                            <p class="text-slate-400 font-bold mt-2 italic text-xs uppercase tracking-widest">Login untuk mengakses sistem</p>
                        </div>
                        <form id="lgn-form" class="space-y-6">
                            <input type="email" id="lgn-email" class="w-full p-5 bg-slate-100 rounded-2xl font-bold outline-none border-none" placeholder="Email Staff">
                            <input type="password" id="lgn-pass" class="w-full p-5 bg-slate-100 rounded-2xl font-bold outline-none border-none" placeholder="Password">
                            <button class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-extrabold text-lg shadow-xl hover:bg-indigo-700 transition-all">Masuk Sekarang</button>
                        </form>
                    </div>
                </div>
            `;

            document.getElementById('lgn-form').onsubmit = async (e) => {
                e.preventDefault();
                try {
                    await signInWithEmailAndPassword(auth, document.getElementById('lgn-email').value, document.getElementById('lgn-pass').value);
                    window.location.reload();
                } catch (err) { alert(err.message); }
            };
        }

    </script>
</body>
</html>
