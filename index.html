<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-RM Klinik Pratama Pro v1.1 | RS Mitra Plumbon</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            transition: background 0.3s;
        }

        .sidebar-item {
            transition: all 0.3s;
            border-radius: 8px;
            margin-bottom: 4px;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background: #4f46e5;
            color: white;
            transform: translateX(5px);
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .dark {
            background-color: #0f172a;
            color: #f8fafc;
        }

        .dark .glass {
            background: rgba(30, 41, 59, 0.9);
            border-color: #334155;
        }

        .loading-skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            pointer-events: none;
        }

        @media (max-width: 640px) {
            #toast-container {
                right: 20px;
                left: 20px;
                top: 10px;
            }
        }

        .toast-item {
            pointer-events: auto;
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800">

    <div id="toast-container"></div>

    <div id="splash-screen" class="fixed inset-0 z-[200] flex flex-col items-center justify-center bg-indigo-900">
        <div class="relative">
            <div class="w-20 h-20 border-4 border-indigo-200 border-t-white rounded-full animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <i id="splash-icon" class="fas fa-wifi text-white text-xl animate-pulse"></i>
            </div>
        </div>
        <p class="text-white mt-4 font-medium animate-pulse" id="splash-text">Menghubungkan ke server...</p>
    </div>

    <div id="login-section"
        class="fixed inset-0 z-[100] flex items-center justify-center bg-indigo-900 overflow-hidden">
        <div class="absolute inset-0 opacity-20">
            <div
                class="absolute top-0 left-0 w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl animate-pulse">
            </div>
            <div
                class="absolute bottom-0 right-0 w-96 h-96 bg-purple-400 rounded-full mix-blend-multiply filter blur-3xl animate-pulse">
            </div>
        </div>
        <div class="glass p-8 rounded-2xl shadow-2xl w-full max-w-md relative z-10 animate__animated animate__zoomIn">
            <div class="text-center mb-8">
                <div
                    class="bg-indigo-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl shadow-lg">
                    <i class="fas fa-clinic-medical"></i>
                </div>
                <h2 class="text-3xl font-bold text-indigo-900 dark:text-white">E-RM PRO</h2>
                <p class="text-slate-500 text-sm mt-1">Sistem Rekam Medis Terintegrasi v1.1</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Email Staff</label>
                    <input type="email" id="login-email"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all"
                        placeholder="name@clinic.com" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Password</label>
                    <input type="password" id="login-pass"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all"
                        placeholder="••••••••" required>
                </div>
                <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg active:scale-95">
                    Masuk ke Sistem <i class="fas fa-sign-in-alt ml-2"></i>
                </button>
            </form>
            <div class="mt-6 text-center text-xs text-slate-400">
                &copy; 2024 RS Mitra Plumbon. All Rights Reserved.
            </div>
        </div>
    </div>

    <div id="app-wrapper" class="hidden flex h-screen overflow-hidden">

        <div id="sidebar-overlay" onclick="toggleSidebar()"
            class="hidden fixed inset-0 bg-black/50 z-[45] backdrop-blur-sm transition-opacity duration-300"></div>

        <aside id="sidebar"
            class="fixed inset-y-0 left-0 z-50 w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col transform -translate-x-full transition-transform duration-300 ease-in-out md:relative md:translate-x-0">
            <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2 rounded-lg text-white"><i class="fas fa-notes-medical"></i></div>
                    <span class="font-bold text-xl tracking-tight text-indigo-900 dark:text-white">E-RM PRO</span>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-slate-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>

            <nav class="flex-1 overflow-y-auto p-4 space-y-1" id="main-nav">
            </nav>

            <div class="p-4 border-t border-slate-100 dark:border-slate-800">
                <div class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-xl mb-3">
                    <div class="w-10 h-10 rounded-full bg-indigo-200 flex items-center justify-center text-indigo-700 font-bold"
                        id="user-initial">U</div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-bold truncate text-gray-900 dark:text-white" id="user-display-name">
                            Loading...
                        </p>
                        <p class="text-[10px] uppercase tracking-wider text-slate-500" id="user-role-label">Role</p>
                    </div>
                </div>
                <button onclick="logout()"
                    class="w-full flex items-center gap-3 px-4 py-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-all">
                    <i class="fas fa-power-off"></i> <span class="text-sm font-semibold">Log Out</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-50 dark:bg-slate-950 overflow-hidden relative">

            <header
                class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md px-4 md:px-8 flex items-center justify-between z-40">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()"
                        class="md:hidden p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                        <i class="fas fa-bars text-indigo-600"></i>
                    </button>
                    <div>
                        <h1 id="page-title" class="text-lg md:text-xl font-bold text-slate-800 dark:text-white">
                            Dashboard</h1>
                        <span id="current-date" class="hidden md:inline text-xs text-slate-500 font-medium"></span>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()"
                        class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                        <i class="fas fa-moon dark:hidden"></i>
                        <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                    </button>
                    <div class="h-8 w-[1px] bg-slate-200 dark:bg-slate-700 mx-2"></div>
                    <div class="flex items-center gap-2">
                        <span class="flex h-3 w-3 relative">
                            <span
                                class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                        </span>
                        <span class="text-xs font-bold text-green-600 uppercase">Sistem Online</span>
                    </div>
                </div>
            </header>

            <section id="content-display" class="flex-1 overflow-y-auto p-4 md:p-8 animate__animated animate__fadeIn">
            </section>
        </main>
    </div>

    <div id="modal-container"
        class="hidden fixed inset-0 z-[110] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
        <div id="modal-body"
            class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto p-4 md:p-8 relative animate__animated animate__zoomIn">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIG (Sesuai Data Anda)
        const firebaseConfig = {
            apiKey: "AIzaSyBx1cYtGcnppOhMmhH0wOXqwGFWLiGM7kk",
            authDomain: "develop-212.firebaseapp.com",
            databaseURL: "https://develop-212-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "develop-212",
            storageBucket: "develop-212.firebasestorage.app",
            messagingSenderId: "79717438597",
            appId: "1:79717438597:web:e28c0be0c64667891ec5ec",
            measurementId: "G-7EDQWV1HV7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let isFirstLoad = true;
        const splashIcon = document.getElementById('splash-icon');
        const splashText = document.getElementById('splash-text');

        // Cek Koneksi Firebase
        const connectedRef = ref(db, ".info/connected");
        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                if (isFirstLoad) {
                    // Ganti ikon ke mode "Check User" saat koneksi berhasil
                    splashIcon.className = "fas fa-user-check text-white text-xl animate__animated animate__bounceIn";
                    splashText.innerText = "Memeriksa Sesi...";
                }
            } else {
                // Ikon saat offline
                splashIcon.className = "fas fa-plug text-red-400 text-xl";
                splashText.innerText = "Menunggu Koneksi...";
            }
        });

        // APP STATE
        let currentUser = null;
        let userData = null;

        const rolesMap = {
            'admin': { icon: 'fa-user-shield', label: 'Admin/Owner', modules: ['dashboard', 'pendaftaran', 'perawat', 'dokter', 'radiologi', 'lab', 'farmasi', 'gudang', 'kasir', 'master'] },
            'pendaftaran': { icon: 'fa-id-card', label: 'Pendaftaran', modules: ['dashboard', 'pendaftaran'] },
            'perawat': { icon: 'fa-user-nurse', label: 'Perawat', modules: ['dashboard', 'perawat'] },
            'dokter': { icon: 'fa-user-md', label: 'Dokter', modules: ['dashboard', 'dokter'] },
            'radiologi': { icon: 'fa-x-ray', label: 'Radiologi', modules: ['dashboard', 'radiologi'] },
            'lab': { icon: 'fa-microscope', label: 'Laboratorium', modules: ['dashboard', 'lab'] },
            'farmasi': { icon: 'fa-pills', label: 'Farmasi', modules: ['dashboard', 'farmasi'] },
            'gudang': { icon: 'fa-warehouse', label: 'Gudang Farmasi', modules: ['dashboard', 'gudang'] },
            'kasir': { icon: 'fa-file-invoice-dollar', label: 'Kasir', modules: ['dashboard', 'kasir'] }
        };

        // --- AUTH LOGIC ---
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;

            try {
                const cred = await signInWithEmailAndPassword(auth, email, pass);
                toast('Selamat Datang!', 'success');
            } catch (err) {
                toast('Login Gagal: ' + err.message, 'error');
            }
        };

        onAuthStateChanged(auth, async (user) => {
            const splash = document.getElementById('splash-screen');
            const loginSec = document.getElementById('login-section');
            const appWrap = document.getElementById('app-wrapper');

            if (user) {
                // Saat user ditemukan, ganti ke ikon sukses sebelum masuk
                splashIcon.className = "fas fa-check-circle text-green-400 text-2xl animate__animated animate__scaleUp";
                splashText.innerText = "Sesi Ditemukan!";

                currentUser = user;
                const snapshot = await get(ref(db, `users/${user.uid}`));
                userData = snapshot.exists() ? snapshot.val() : { role: 'admin', name: user.email.split('@')[0] };

                // Redirect
                loginSec.classList.add('hidden');
                appWrap.classList.remove('hidden');
                if (isFirstLoad) toast(`Login Otomatis: ${userData.name}`, 'success');
                initAppUI();
            } else {
                // Jika tidak ada sesi, biarkan ikon tetap user-check sebentar lalu ke login
                appWrap.classList.add('hidden');
                loginSec.classList.remove('hidden');
            }

            // Tutup splash screen
            if (isFirstLoad) {
                setTimeout(() => {
                    splash.classList.add('animate__animated', 'animate__fadeOut');
                    setTimeout(() => splash.classList.add('hidden'), 500);
                    isFirstLoad = false;
                }, 1500); // Beri jeda agar user sempat melihat ikon "Sesi Ditemukan"
            }
        });

        window.logout = () => signOut(auth);

        // --- UI CORE ---
        function initAppUI() {
            document.getElementById('user-initial').innerText = userData.name.charAt(0).toUpperCase();
            document.getElementById('user-display-name').innerText = userData.name;
            document.getElementById('user-role-label').innerText = userData.role;
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            renderSidebar();
            renderModule('dashboard');
        }

        function renderSidebar() {
            const nav = document.getElementById('main-nav');
            nav.innerHTML = '';
            const userModules = rolesMap[userData.role].modules;

            userModules.forEach(mod => {
                const config = {
                    'dashboard': { label: 'Dashboard', icon: 'fa-chart-pie' },
                    'pendaftaran': { label: 'Pendaftaran', icon: 'fa-user-plus' },
                    'perawat': { label: 'Perawat (TTV)', icon: 'fa-stethoscope' },
                    'dokter': { label: 'Pemeriksaan Dokter', icon: 'fa-user-md' },
                    'radiologi': { label: 'Unit Radiologi', icon: 'fa-x-ray' },
                    'lab': { label: 'Unit Lab', icon: 'fa-vials' },
                    'farmasi': { label: 'Apotek/Farmasi', icon: 'fa-pills' },
                    'gudang': { label: 'Stok Obat', icon: 'fa-boxes-stacked' },
                    'kasir': { label: 'Kasir & Billing', icon: 'fa-receipt' },
                    'master': { label: 'Data Master', icon: 'fa-database' }
                };

                const div = document.createElement('div');
                div.className = `sidebar-item flex items-center gap-3 px-4 py-3 cursor-pointer font-medium text-slate-600 dark:text-slate-400 ${mod === 'dashboard' ? 'active' : ''}`;
                div.innerHTML = `<i class="fas ${config[mod].icon} w-5"></i> <span>${config[mod].label}</span>`;
                div.onclick = () => {
                    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                    div.classList.add('active');
                    if (window.innerWidth < 768) toggleSidebar();
                    renderModule(mod);
                };
                nav.appendChild(div);
            });
        }

        function renderModule(mod) {
            const display = document.getElementById('content-display');
            document.getElementById('page-title').innerText = mod.toUpperCase();

            // Basic Templates
            switch (mod) {
                case 'dashboard': renderDashboard(display); break;
                case 'pendaftaran': renderPendaftaran(display); break;
                case 'perawat': renderPerawat(display); break;
                case 'dokter': renderDokter(display); break;
                case 'gudang': renderGudang(display); break;
                case 'farmasi': renderFarmasi(display); break;
                case 'kasir': renderKasir(display); break;
                case 'radiologi': renderPenunjang(display, 'radiologi'); break;
                case 'lab': renderPenunjang(display, 'lab'); break;
                case 'master': renderMaster(display); break;
                default: display.innerHTML = `<div class="p-10 text-center text-slate-400"><i class="fas fa-tools text-6xl mb-4"></i><p>Modul ${mod} sedang dalam pengembangan.</p></div>`;
            }
        }

        // --- MODULE: DASHBOARD ---
        async function renderDashboard(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="glass p-6 rounded-2xl border-l-4 border-indigo-500 shadow-sm animate__animated animate__fadeInUp">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Pasien Hari Ini</p>
                        <h3 class="text-3xl font-bold mt-1" id="dash-pasien-count">0</h3>
                    </div>
                    <div class="glass p-6 rounded-2xl border-l-4 border-emerald-500 shadow-sm animate__animated animate__fadeInUp" style="animation-delay: 0.1s">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Kunjungan Selesai</p>
                        <h3 class="text-3xl font-bold mt-1" id="dash-done-count">0</h3>
                    </div>
                    <div class="glass p-6 rounded-2xl border-l-4 border-amber-500 shadow-sm animate__animated animate__fadeInUp" style="animation-delay: 0.2s">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Menunggu Obat</p>
                        <h3 class="text-3xl font-bold mt-1" id="dash-farmasi-count">0</h3>
                    </div>
                    <div class="glass p-6 rounded-2xl border-l-4 border-rose-500 shadow-sm animate__animated animate__fadeInUp" style="animation-delay: 0.3s">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Stok Obat Kritis</p>
                        <h3 class="text-3xl font-bold mt-1">5</h3>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="glass p-6 rounded-2xl shadow-sm h-80">
                        <h4 class="font-bold mb-4">Statistik Kunjungan Mingguan</h4>
                        <canvas id="chartKunjungan"></canvas>
                    </div>
                    <div class="glass p-6 rounded-2xl shadow-sm h-80 overflow-y-auto">
                        <h4 class="font-bold mb-4">Antrian Berjalan</h4>
                        <div id="live-antrian" class="space-y-3 text-sm"></div>
                    </div>
                </div>
            `;

            // Fetch Real Stats
            onValue(ref(db, 'pendaftaran'), (snap) => {
                const data = snap.val() || {};
                const list = Object.values(data);
                document.getElementById('dash-pasien-count').innerText = list.length;
                document.getElementById('dash-done-count').innerText = list.filter(p => p.status === 'SELESAI').length;
                document.getElementById('dash-farmasi-count').innerText = list.filter(p => p.status === 'FARMASI').length;

                const antrian = document.getElementById('live-antrian');
                antrian.innerHTML = list.slice(-5).map(p => `
                    <div class="flex items-center justify-between p-3 bg-white dark:bg-slate-800 rounded-lg border border-slate-100 dark:border-slate-700">
                        <span class="px-2 py-1 rounded bg-gray-200 text-gray-800">
                            ${p.norm}
                        </span>
                        <span class="px-2 py-1 rounded text-[10px] font-bold ${getStatusColor(p.status)} text-white">${p.status}</span>
                    </div>
                `).join('');
            });

            // Mini Chart
            new Chart(document.getElementById('chartKunjungan'), {
                type: 'line',
                data: {
                    labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
                    datasets: [{ label: 'Pasien', data: [12, 19, 15, 25, 22, 30, 10], borderColor: '#6366f1', tension: 0.4 }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        // --- MODULE: PENDAFTARAN ---
        function renderPendaftaran(el) {
            const today = new Date().toISOString().split('T')[0].replace(/-/g, '');
            const newNoRM = 'RM-' + today + '-' + Math.floor(1000 + Math.random() * 9000);

            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="md:col-span-1 glass p-6 rounded-2xl shadow-lg h-fit">
                        <h4 class="font-bold text-xl mb-6 flex items-center gap-2"><i class="fas fa-plus-circle text-indigo-500"></i> Register Pasien Baru</h4>
                        <form id="form-pendaftaran" class="space-y-4">
                            <div>
                                <label class="text-xs font-bold text-slate-500">NOMOR REKAM MEDIS</label>
                                <input type="text" id="p-norm" value="${newNoRM}" class="w-full bg-slate-100 p-3 rounded-xl font-mono font-bold text-indigo-600" readonly>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-500">NAMA LENGKAP</label>
                                <input type="text" id="p-nama" class="w-full border p-3 rounded-xl focus:ring-2 ring-indigo-500 outline-none" placeholder="Masukkan nama..." required>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-500">NIK (KTP)</label>
                                <input type="number" id="p-nik" class="w-full border p-3 rounded-xl focus:ring-2 ring-indigo-500 outline-none" placeholder="16 Digit NIK" required>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-xs font-bold text-slate-500">JNS KELAMIN</label>
                                    <select id="p-jk" class="w-full border p-3 rounded-xl outline-none">
                                        <option value="L">Laki-laki</option>
                                        <option value="P">Perempuan</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-slate-500">TGL LAHIR</label>
                                    <input type="date" id="p-tgl" class="w-full border p-3 rounded-xl outline-none" required>
                                </div>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-500">WHATSAPP</label>

                        <!-- ================= TINDAKAN ================= -->

        let currentResep = [];
        window.tambahItemResep = async () => {
            // 1. Caching element
            const elSelect = document.getElementById('select-obat');
            const elQty = document.getElementById('qty-obat');

            // 2. Ambil Option yang sedang terpilih
            const selectedOption = elSelect.selectedOptions[0];
            const idObat = elSelect.value;
            const qtyInput = parseInt(elQty.value);

            // 3. Validasi Input Dasar (Apakah obat & qty sudah diisi?)
            if (!idObat || isNaN(qtyInput) || qtyInput <= 0) {
                return toast('Pilih obat dan masukkan jumlah yang benar', 'error');
            }

            // 4. Ambil data langsung dari atribut "data-*" di HTML
            const namaObat = selectedOption.dataset.nama;
            const stokTersedia = parseInt(selectedOption.dataset.stok || 0);
            const hargaObat = parseInt(selectedOption.dataset.harga || 0);

            // 5. Cek apakah obat ini sudah ada di daftar resep sementara?
            const sdhAda = currentResep.find(item => item.id === idObat);
            const totalAkanInput = sdhAda ? (parseInt(sdhAda.qty) + qtyInput) : qtyInput;

            // 6. Validasi Stok Langsung (Tanpa loading/delay)
            if (totalAkanInput > stokTersedia) {
                return toast('Stok tidak cukup!<br>Sisa stok: ' + stokTersedia + '. Anda mencoba memasukkan: ' + totalAkanInput, 'warning');
            }

            // 7. Simpan ke array currentResep
            currentResep.push({
                id: idObat,
                nama: idObat,
                qty: qtyInput,
                harga: hargaObat
            });

            // 8. Update Tampilan & Reset Input
            elSelect.selectedIndex = 0;
            elQty.value = '';
            renderResepList();

            toast(`${namaObat} (x${qtyInput}) ditambahkan ke resep`, 'success');

            const selectedOption = elSelect.selectedOptions[0];
            const idTindakan = elSelect.value;

                return toast('Pilih tindakan terlebih dahulu', 'error');

            currentTindakan.push({
                id: idTindakan,
                nama: namaTindakan,
                harga: hargaTindakan
            });

            elSelect.selectedIndex = 0;

            toast(`${namaTindakan} ditambahkan ke tindakan`, 'success');

                </div>

        window.simpanPemeriksaanDokter = async (id) => {
            const anamnesa = document.getElementById('dr-anamnesa').value;
            const diagnosa = document.getElementById('dr-diagnosa').value;
            const isRad = document.getElementById('order-rad').checked;
            const isLab = document.getElementById('order-lab').checked;

            let bayarResep = 0;
            let bayarTindakan = 0;

            // Update Stok Master (Simpel)
            const masterObatSnap = await get(ref(db, 'master_obat'));
            const masterObat = masterObatSnap.val();
            currentResep.forEach(item => {
                for (let key in masterObat) {
                    if (masterObat[key].nama === item.nama) {
                        const harga = masterObat[key].harga || 0;
                        const qty = parseInt(item.qty) || 0;

                        bayarResep += harga * qty;

                        update(ref(db, `master_obat/${key}`), { stok: masterObat[key].stok - item.qty });
                    }
                }
            });

            currentTindakan.forEach(item => {
                const harga = parseInt(item.harga || 0);
                const qty = parseInt(item.qty || 1);

                bayarTindakan += harga * qty;
            });

            const updates = {
                anamnesa,
                diagnosa,
                resep: currentResep,
                tindakan: currentTindakan,
                pemeriksaan_rad: isRad ? document.getElementById('det-rad').value : null,
                pemeriksaan_lab: isLab ? document.getElementById('det-lab').value : null,
                status: isRad ? 'RADIOLOGI' : (isLab ? 'LAB' : 'FARMASI'),
                waktu_dokter: new Date().toISOString(),
                total_bayar: bayarResep + bayarTindakan
            };

            await update(ref(db, `pendaftaran/${id}`), updates);
            toast('Resume medis berhasil disimpan!', 'success');
            currentResep = [];
            hideModal();
        };

        // --- MODULE: GUDANG FARMASI ---
        function renderGudang(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="glass p-6 rounded-2xl h-fit">
                        <h4 class="font-bold mb-6">Input Stok Obat</h4>
                        <form id="form-obat" class="space-y-4">
                            <input type="text" id="o-nama" class="w-full border p-3 rounded-xl outline-none" placeholder="Nama Obat" required>
                            <input type="number" id="o-stok" class="w-full border p-3 rounded-xl outline-none" placeholder="Jumlah Stok" required>
                            <input type="text" id="o-satuan" class="w-full border p-3 rounded-xl outline-none" placeholder="Satuan (Pcs/Box)">
                            <input type="number" id="o-harga" class="w-full border p-3 rounded-xl outline-none" placeholder="Harga Jual" required>
                            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">SIMPAN MASTER</button>
                        </form>
                    </div>
                    <div class="md:col-span-2 glass p-6 rounded-2xl">
                        <h4 class="font-bold mb-4">Daftar Stok Inventori</h4>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="list-obat-gudang"></div>
                    </div>
                </div>
            `;

            document.getElementById('form-obat').onsubmit = async (e) => {
                e.preventDefault();
                const payload = {
                    nama: document.getElementById('o-nama').value,
                    stok: parseInt(document.getElementById('o-stok').value),
                    satuan: document.getElementById('o-satuan').value,
                    harga: parseInt(document.getElementById('o-harga').value)
                };
                await push(ref(db, 'master_obat'), payload);
                toast('Obat ditambahkan!', 'success');
                e.target.reset();
            };

            onValue(ref(db, 'master_obat'), (snap) => {
                const data = snap.val() || {};
                const container = document.getElementById('list-obat-gudang');

                container.innerHTML = Object.values(data).map(o => {
                    // Pastikan harga adalah angka sebelum toLocaleString
                    const harga = o.harga ? o.harga.toLocaleString() : '0';

                    return `
            <div class="p-4 bg-white dark:bg-slate-800 border border-slate-700 rounded-xl">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${o.satuan || 'UNIT'}</p>
                <h6 class="font-bold text-sm text-slate-200">${o.nama || 'Nama Tidak Ada'}</h6> 
                <div class="flex justify-between items-end mt-4">
                     <span class="text-3xl font-bold ${o.stok < 10 ? 'text-red-500' : 'text-indigo-400'}">${o.stok || 0}</span>
                     <span class="text-xs text-slate-400">Rp ${harga}</span>
                </div>
            </div>
        `;
                }).join('');
            });
        }

        // --- MODULE: FARMASI ---
        function renderFarmasi(el) {
            el.innerHTML = `
                <div class="glass p-6 rounded-2xl shadow-sm">
                    <h4 class="font-bold text-xl mb-6">Antrian E-Resep (Apotek)</h4>
                    <div id="antrian-farmasi" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            `;

            onValue(ref(db, 'pendaftaran'), (snap) => {
                const data = snap.val() || {};
                const list = Object.entries(data).filter(([id, p]) => p.status === 'FARMASI');
                const container = document.getElementById('antrian-farmasi');

                container.innerHTML = list.map(([id, p]) => {
                    const resepList = Array.isArray(p.resep) ? p.resep : [];

                    return `
                    <div class="bg-white p-6 rounded-2xl border flex justify-between items-center animate__animated animate__fadeIn">
                        <div>
                            <h5 class="font-bold text-lg">${p.nama}</h5>
                            <p class="text-xs text-slate-500 mb-2">${p.norm} | Dokter: Dr. Admin</p>
                            
                            <div class="flex flex-wrap gap-2">
                                ${resepList.length > 0
                            ? resepList.map(r => `
                                        <span class="px-2 py-1 bg-slate-100 rounded text-[10px] font-bold">
                                            ${r.nama} (${r.qty})
                                        </span>
                                    `).join('')
                            : `<span class="text-xs text-slate-400 italic">Tidak ada resep</span>`
                        }
                            </div>
                        </div>

                        <div class="flex flex-col gap-2">
                            <button onclick="updateStatus('${id}', 'KASIR', 'Selesai Racik')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-bold">PROSES & SELESAI</button>
                            <button onclick="kirimWA('${p.wa}', 'Halo Bapak/Ibu ${p.nama}, obat Anda sedang disiapkan di Apotek.')" class="bg-green-100 text-green-700 px-4 py-2 rounded-xl text-sm font-bold">
                                <i class="fab fa-whatsapp"></i> NOTIF
                            </button>
                        </div>
                    </div>
                    `;
                }).join('');
            });
        }

        // --- MODULE: KASIR ---
        function renderKasir(el) {
            el.innerHTML = `
                <div class="glass p-6 rounded-2xl shadow-sm">
                    <h4 class="font-bold text-xl mb-6">Billing & Pembayaran</h4>
                    <div class="overflow-x-auto">
                         <table class="w-full">
                            <thead>
                                <tr class="text-left border-b">
                                    <th class="p-3">Pasien</th>
                                    <th class="p-3">Tindakan</th>
                                    <th class="p-3">Obat</th>
                                    <th class="p-3">Total Tagihan</th>
                                    <th class="p-3">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="table-kasir"></tbody>
                         </table>
                    </div>
                </div>
            `;

            onValue(ref(db, 'pendaftaran'), (snap) => {
                const data = snap.val() || {};
                const list = Object.entries(data).filter(([id, p]) => p.status === 'KASIR');

                document.getElementById('table-kasir').innerHTML = list.map(([id, p]) => {
                    return `
                        <tr class="border-b hover:bg-slate-50">
                            <td class="p-3">
                                <b>${p.nama}</b><br>
                                <span class="text-xs text-slate-400">${p.norm}</span>
                            </td>
                            <td class="p-3">${p.tindakan ? p.tindakan.length : 0} Tindakan</td>
                            <td class="p-3">${p.resep ? p.resep.length : 0} Item</td>
                            <td class="p-3 font-bold text-indigo-600">
                                Rp ${p.total_bayar.toLocaleString()}
                            </td>
                            <td class="p-3">
                                <button onclick="prosesBayar('${id}', ${p.total_bayar})" 
                                    class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-xs font-bold">
                                    BAYAR & CETAK
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            });
        }

        window.prosesBayar = async (id, total) => {
            if (!confirm('Konfirmasi pembayaran Lunas?')) return;

            // 1. Ambil data pasien (pendaftaran) dari database berdasarkan ID
            const snap = await get(ref(db, `pendaftaran/${id}`));
            const data = snap.val();

            if (!data) {
                toast('Data pasien tidak ditemukan!', 'error');
                return;
            }

            // 2. Update status pembayaran di database
            // await update(ref(db, `pendaftaran/${id}`), {
            //     status: 'SELESAI',
            //     total_bayar: total
            // });

            toast('Pembayaran Berhasil! Mengunduh Invoice...', 'success');

            // ==========================================
            // 3. LOGIKA CETAK JS-PDF (Ukuran Struk Thermal 80mm)
            // ==========================================
            const { jsPDF } = window.jspdf;

            // Setting orientasi portrait, satuan mm, dan ukuran kertas [lebar 80, tinggi 150]
            const doc = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: [80, 150]
            });

            // --- HEADER KLINIK ---
            doc.setFont("helvetica", "bold");
            doc.setFontSize(12);
            doc.text("KLINIK PRATAMA", 40, 10, { align: "center" });

            doc.setFont("helvetica", "normal");
            doc.setFontSize(8);
            doc.text("Jl. Mutiara Cempaka No. 06", 40, 14, { align: "center" });
            doc.text("Telp: 0812-3456-7890", 40, 18, { align: "center" });

            doc.setLineWidth(0.5);
            doc.line(5, 20, 75, 20); // Garis pembatas

            // --- INFO PASIEN ---
            // Format tanggal ke lokal Indonesia
            const tglBayar = new Date().toLocaleString('id-ID', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit'
            });

            doc.text(`Tgl    : ${tglBayar}`, 5, 25);
            doc.text(`No RM  : ${data.norm}`, 5, 29);
            doc.text(`Pasien : ${data.nama}`, 5, 33);

            doc.line(5, 35, 75, 35); // Garis pembatas

            // --- RINCIAN RESEP / TINDAKAN ---
            doc.setFont("helvetica", "normal");

            let yPos = 45;

            // ================= TINDAKAN =================
            doc.text("Tindakan:", 5, yPos);
            yPos += 5;

            if (data.tindakan && data.tindakan.length > 0) {
                data.tindakan.forEach((item, index) => {
                    const harga = item.harga || 0;
                    const qty = item.qty || 1;
                    const subtotal = harga * qty;

                    doc.text(`${index + 1}. ${item.nama}`, 5, yPos);
                    doc.text(`x${qty}`, 45, yPos);
                    doc.text(`${subtotal}`, 75, yPos, { align: "right" });

                    yPos += 5;
                });
            } else {
                doc.text("- Tidak ada tindakan -", 5, yPos);
                yPos += 5;
            }

            yPos += 3;

            // ================= RESEP =================
            doc.text("Resep:", 5, yPos);
            yPos += 5;

            if (data.resep && data.resep.length > 0) {
                data.resep.forEach((obat, index) => {
                    const harga = obat.harga || 0;
                    const qty = obat.qty || 0;
                    const subtotal = harga * qty;

                    doc.text(`${index + 1}. ${obat.nama}`, 5, yPos);
                    doc.text(`x${qty}`, 45, yPos);
                    doc.text(`${subtotal}`, 75, yPos, { align: "right" });

                    yPos += 5;
                });
            } else {
                doc.text("- Tidak ada resep obat -", 5, yPos);
                yPos += 5;
            }

            doc.line(5, yPos + 2, 75, yPos + 2); // Garis pembatas
            yPos += 8;

            // --- TOTAL PEMBAYARAN ---
            doc.setFont("helvetica", "bold");
            doc.setFontSize(10);
            doc.text("TOTAL BAYAR :", 5, yPos);
            // Format angka ke mata uang Rupiah
            const totalRupiah = parseInt(total).toLocaleString('id-ID');
            doc.text(`Rp ${totalRupiah}`, 75, yPos, { align: "right" });

            // --- FOOTER ---
            yPos += 15;
            doc.setFont("helvetica", "italic");
            doc.setFontSize(8);
            doc.text("Terima kasih", 40, yPos, { align: "center" });
            doc.text("Semoga lekas sembuh", 40, yPos + 4, { align: "center" });

            // --- PROSES UNDUH PDF ---
            // Membersihkan spasi pada nama file agar rapi
            const fileName = `Invoice_${data.nama.replace(/\s+/g, '_')}_${data.norm}.pdf`;
            doc.save(fileName);
        };

        // --- MODULE: RADIOLOGI & LAB (PENUNJANG) ---
        function renderPenunjang(el, type) {
            el.innerHTML = `
                <div class="glass p-6 rounded-2xl shadow-sm">
                    <h4 class="font-bold text-xl mb-6 capitalize">Antrian Penunjang: ${type}</h4>
                    <div id="antrian-penunjang" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
                </div>
            `;

            onValue(ref(db, 'pendaftaran'), (snap) => {
                const data = snap.val() || {};
                const list = Object.entries(data).filter(([id, p]) => p.status === type.toUpperCase());

                document.getElementById('antrian-penunjang').innerHTML = list.map(([id, p]) => `
                    <div class="bg-white p-5 rounded-2xl border border-slate-200">
                        <h5 class="font-bold">${p.nama}</h5>
                        <p class="text-[10px] font-mono mb-3">${p.norm}</p>
                        <div class="bg-slate-50 p-3 rounded-xl mb-4 text-xs">
                             <b>Permintaan:</b><br>
                             ${type === 'radiologi' ? p.pemeriksaan_rad : p.pemeriksaan_lab}
                        </div>
                        <button onclick="updateStatus('${id}', 'FARMASI', 'Selesai Penunjang')" class="w-full bg-slate-800 text-white py-2 rounded-lg text-xs font-bold">INPUT HASIL & TERUSKAN</button>
                    </div>
                `).join('');
            });
        }

        // --- MODULE: MASTER TINDAKAN ---
        async function renderMaster(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="md:col-span-1">
                        <div class="glass p-6 rounded-2xl shadow-lg sticky top-8">
                            <h4 id="form-title" class="font-bold text-xl mb-6 flex items-center gap-2">
                                <i class="fas fa-hand-holding-medical text-indigo-500"></i> Tambah Tindakan
                            </h4>
                            <form id="form-tindakan" class="space-y-4">
                                <input type="hidden" id="t-id-lama"> <div>
                                    <label class="text-xs font-bold text-slate-500 uppercase">Kode Tindakan</label>
                                    <input type="text" id="t-kode" class="w-full border p-3 rounded-xl focus:ring-2 ring-indigo-500 outline-none font-mono" placeholder="Contoh: T001" required>
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-slate-500 uppercase">Nama Tindakan</label>
                                    <input type="text" id="t-nama" class="w-full border p-3 rounded-xl focus:ring-2 ring-indigo-500 outline-none" placeholder="Masukkan nama tindakan..." required>
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-slate-500 uppercase">Harga (Rp)</label>
                                    <input type="number" id="t-harga" class="w-full border p-3 rounded-xl focus:ring-2 ring-indigo-500 outline-none font-bold text-indigo-600" placeholder="0" required>
                                </div>
                                
                                <div class="flex gap-2 pt-4">
                                    <button type="button" onclick="resetFormTindakan()" id="btn-cancel-tindakan" class="hidden flex-1 bg-slate-200 hover:bg-slate-300 font-bold py-3 rounded-xl transition-all">Batal</button>
                                    <button type="submit" id="btn-save-tindakan" class="flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all">Simpan Tindakan</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="md:col-span-2">
                        <div class="glass p-6 rounded-2xl shadow-sm">
                            <div class="flex justify-between items-center mb-6">
                                <h4 class="font-bold">Daftar Tindakan Medis</h4>
                                <div class="relative">
                                    <i class="fas fa-search absolute left-3 top-3 text-slate-400"></i>
                                    <input type="text" id="search-tindakan" onkeyup="filterTindakan()" placeholder="Cari tindakan..." class="pl-10 pr-4 py-2 border rounded-lg text-sm outline-none focus:ring-2 ring-indigo-500">
                                </div>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm">
                                    <thead>
                                        <tr class="text-left border-b border-slate-100 text-slate-400 uppercase text-[10px] tracking-widest">
                                            <th class="p-3">Kode</th>
                                            <th class="p-3">Nama Tindakan</th>
                                            <th class="p-3">Harga</th>
                                            <th class="p-3 text-center">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody id="table-master-tindakan">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Handle Submit (Create & Update)
            document.getElementById('form-tindakan').onsubmit = async (e) => {
                e.preventDefault();
                const kode = document.getElementById('t-kode').value.toUpperCase().trim();
                const nama = document.getElementById('t-nama').value.trim();
                const harga = parseInt(document.getElementById('t-harga').value);
                const idLama = document.getElementById('t-id-lama').value;

                try {
                    // Jika ID berubah saat edit, hapus ID lama
                    if (idLama && idLama !== kode) {
                        await remove(ref(db, `master_tindakan/${idLama}`));
                    }

                    await set(ref(db, `master_tindakan/${kode}`), {
                        nama: nama,
                        harga: harga
                    });

                    toast('Data berhasil disimpan', 'success');
                    resetFormTindakan();
                } catch (err) {
                    toast('Gagal menyimpan data', 'error');
                }
            };

            // Listen Data Realtime
            onValue(ref(db, 'master_tindakan'), (snap) => {
                const data = snap.val() || {};
                const tbody = document.getElementById('table-master-tindakan');

                tbody.innerHTML = Object.entries(data).map(([id, t]) => `
                    <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-all">
                        <td class="p-3 font-mono font-bold text-indigo-600">${id}</td>
                        <td class="p-3 font-semibold">${t.nama}</td>
                        <td class="p-3">Rp ${t.harga.toLocaleString()}</td>
                        <td class="p-3 text-center flex justify-center gap-2">
                            <button onclick="editTindakan('${id}', '${t.nama}', ${t.harga})" class="p-2 bg-amber-100 text-amber-600 rounded-lg hover:bg-amber-600 hover:text-white transition-all">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteTindakan('${id}')" class="p-2 bg-rose-100 text-rose-600 rounded-lg hover:bg-rose-600 hover:text-white transition-all">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            });
        }

        // --- GLOBAL FUNCTIONS FOR MASTER TINDAKAN ---
        window.resetFormTindakan = () => {
            document.getElementById('form-tindakan').reset();
            document.getElementById('t-id-lama').value = '';
            document.getElementById('form-title').innerHTML = '<i class="fas fa-hand-holding-medical text-indigo-500"></i> Tambah Tindakan';
            document.getElementById('btn-save-tindakan').innerText = 'Simpan Tindakan';
            document.getElementById('btn-cancel-tindakan').classList.add('hidden');
            document.getElementById('t-kode').disabled = false;
        };

        window.editTindakan = (id, nama, harga) => {
            document.getElementById('t-kode').value = id;
            document.getElementById('t-id-lama').value = id; // Track original ID
            document.getElementById('t-nama').value = nama;
            document.getElementById('t-harga').value = harga;

            document.getElementById('form-title').innerHTML = '<i class="fas fa-edit text-amber-500"></i> Edit Tindakan';
            document.getElementById('btn-save-tindakan').innerText = 'Update Data';
            document.getElementById('btn-cancel-tindakan').classList.remove('hidden');

            // Scroll ke form jika di mobile
            document.getElementById('form-tindakan').scrollIntoView({ behavior: 'smooth' });
        };

        window.deleteTindakan = (id) => {
            Swal.fire({
                title: 'Hapus Tindakan?',
                text: `Tindakan dengan kode ${id} akan dihapus permanen.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e11d48',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Ya, Hapus!'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    await remove(ref(db, `master_tindakan/${id}`));
                    toast('Berhasil dihapus', 'success');
                }
            });
        };

        window.filterTindakan = () => {
            const val = document.getElementById('search-tindakan').value.toLowerCase();
            const rows = document.querySelectorAll('#table-master-tindakan tr');
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(val) ? '' : 'none';
            });
        };

        // --- HELPERS ---
        window.updateStatus = async (id, status, msg) => {
            await update(ref(db, `pendaftaran/${id}`), { status: status });
            toast(msg, 'success');
        };

        window.toast = (msg, type) => {
            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            div.className = `toast-item p-4 rounded-xl shadow-2xl mb-3 flex items-center gap-3 animate__animated animate__fadeInRight text-white font-bold ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
            div.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> <span>${msg}</span>`;
            container.appendChild(div);
            setTimeout(() => {
                div.classList.replace('animate__fadeInRight', 'animate__fadeOutRight');
                setTimeout(() => div.remove(), 500);
            }, 3000);
        };

        window.showModal = (content) => {
            const container = document.getElementById('modal-container');
            document.getElementById('modal-body').innerHTML = `
                <button onclick="hideModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
                ${content}
            `;
            container.classList.remove('hidden');
        };

        window.hideModal = () => document.getElementById('modal-container').classList.add('hidden');

        window.toggleDarkMode = () => document.body.classList.toggle('dark');

        window.toggleSidebar = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen = !sidebar.classList.contains('-translate-x-full');

            if (isOpen) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            } else {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            }
        };

        function calculateAge(dob) {
            const diff = Date.now() - new Date(dob).getTime();
            return Math.abs(new Date(diff).getUTCFullYear() - 1970);
        }

        function getStatusColor(s) {
            const colors = { 'PERAWAT': 'bg-amber-500', 'DOKTER': 'bg-rose-500', 'FARMASI': 'bg-indigo-500', 'KASIR': 'bg-emerald-500', 'SELESAI': 'bg-slate-500' };
            return colors[s] || 'bg-slate-300';
        }

        window.kirimWA = (no, text) => {
            window.open(`https://wa.me/${no}?text=${encodeURIComponent(text)}`, '_blank');
        };

    </script>
</body>

</html>
