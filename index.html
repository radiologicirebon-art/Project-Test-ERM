<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-RM Klinik Pratama Pro v1.1 | dr. H Dudi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background 0.3s; }
        .sidebar-item { transition: all 0.3s; border-radius: 8px; margin-bottom: 4px; }
        .sidebar-item:hover, .sidebar-item.active { background: #4f46e5; color: white; transform: translateX(5px); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .dark { background-color: #0f172a; color: #f8fafc; }
        .dark .glass { background: rgba(30, 41, 59, 0.9); border-color: #334155; }
        .loading-skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="toast-container"></div>

    <div id="login-section" class="fixed inset-0 z-[100] flex items-center justify-center bg-indigo-900 overflow-hidden">
        <div class="absolute inset-0 opacity-20">
            <div class="absolute top-0 left-0 w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl animate-pulse"></div>
            <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-400 rounded-full mix-blend-multiply filter blur-3xl animate-pulse"></div>
        </div>
        <div class="glass p-8 rounded-2xl shadow-2xl w-full max-w-md relative z-10 animate__animated animate__zoomIn">
            <div class="text-center mb-8">
                <div class="bg-indigo-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl shadow-lg">
                    <i class="fas fa-clinic-medical"></i>
                </div>
                <h2 class="text-3xl font-bold text-indigo-900 dark:text-white">E-RM PRO</h2>
                <p class="text-slate-500 text-sm mt-1">Sistem Rekam Medis Terintegrasi v1.1</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Email Staff</label>
                    <input type="email" id="login-email" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all" placeholder="name@clinic.com" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Password</label>
                    <input type="password" id="login-pass" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all" placeholder="••••••••" required>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg active:scale-95">
                    Masuk ke Sistem <i class="fas fa-sign-in-alt ml-2"></i>
                </button>
            </form>
            <div class="mt-6 text-center text-xs text-slate-400">
                &copy; 2024 RS Mitra Plumbon. All Rights Reserved.
            </div>
        </div>
    </div>

    <div id="app-wrapper" class="hidden flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col z-50">
            <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white"><i class="fas fa-notes-medical"></i></div>
                <span class="font-bold text-xl tracking-tight text-indigo-900 dark:text-white">E-RM PRO</span>
            </div>
            
            <nav class="flex-1 overflow-y-auto p-4 space-y-1" id="main-nav">
                </nav>

            <div class="p-4 border-t border-slate-100 dark:border-slate-800">
                <div class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-xl mb-3">
                    <div class="w-10 h-10 rounded-full bg-indigo-200 flex items-center justify-center text-indigo-700 font-bold" id="user-initial">U</div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-bold truncate" id="user-display-name">Loading...</p>
                        <p class="text-[10px] uppercase tracking-wider text-slate-500" id="user-role-label">Role</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-all">
                    <i class="fas fa-power-off"></i> <span class="text-sm font-semibold">Log Out</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-50 dark:bg-slate-950 overflow-hidden relative">
            
            <header class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md px-8 flex items-center justify-between z-40">
                <div class="flex items-center gap-4">
                    <h1 id="page-title" class="text-xl font-bold text-slate-800 dark:text-white">Dashboard</h1>
                    <span id="current-date" class="text-sm text-slate-500 font-medium"></span>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                        <i class="fas fa-moon dark:hidden"></i>
                        <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                    </button>
                    <div class="h-8 w-[1px] bg-slate-200 dark:bg-slate-700 mx-2"></div>
                    <div class="flex items-center gap-2">
                        <span class="flex h-3 w-3 relative">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                        </span>
                        <span class="text-xs font-bold text-green-600 uppercase">Sistem Online</span>
                    </div>
                </div>
            </header>

            <section id="content-display" class="flex-1 overflow-y-auto p-8 animate__animated animate__fadeIn">
                </section>
        </main>
    </div>

    <div id="modal-container" class="hidden fixed inset-0 z-[110] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
        <div id="modal-body" class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto p-8 relative animate__animated animate__zoomIn">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIG (Sesuai Data Anda)
        const firebaseConfig = {
            apiKey: "AIzaSyBx1cYtGcnppOhMmhH0wOXqwGFWLiGM7kk",
            authDomain: "develop-212.firebaseapp.com",
            databaseURL: "https://develop-212-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "develop-212",
            storageBucket: "develop-212.firebasestorage.app",
            messagingSenderId: "79717438597",
            appId: "1:79717438597:web:e28c0be0c64667891ec5ec",
            measurementId: "G-7EDQWV1HV7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        // APP STATE
        let currentUser = null;
        let userData = null;

        const rolesMap = {
            'admin': { icon: 'fa-user-shield', label: 'Admin/Owner', modules: ['dashboard', 'pendaftaran', 'perawat', 'dokter', 'radiologi', 'lab', 'farmasi', 'gudang', 'kasir', 'master'] },
            'pendaftaran': { icon: 'fa-id-card', label: 'Pendaftaran', modules: ['dashboard', 'pendaftaran'] },
            'perawat': { icon: 'fa-user-nurse', label: 'Perawat', modules: ['dashboard', 'perawat'] },
            'dokter': { icon: 'fa-user-md', label: 'Dokter', modules: ['dashboard', 'dokter'] },
            'radiologi': { icon: 'fa-x-ray', label: 'Radiologi', modules: ['dashboard', 'radiologi'] },
            'lab': { icon: 'fa-microscope', label: 'Laboratorium', modules: ['dashboard', 'lab'] },
            'farmasi': { icon: 'fa-pills', label: 'Farmasi', modules: ['dashboard', 'farmasi'] },
            'gudang': { icon: 'fa-warehouse', label: 'Gudang Farmasi', modules: ['dashboard', 'gudang'] },
            'kasir': { icon: 'fa-file-invoice-dollar', label: 'Kasir', modules: ['dashboard', 'kasir'] }
        };

        // --- AUTH LOGIC ---
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            
            try {
                const cred = await signInWithEmailAndPassword(auth, email, pass);
                toast('Selamat Datang!', 'success');
            } catch (err) {
                toast('Login Gagal: ' + err.message, 'error');
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const snapshot = await get(ref(db, `users/${user.uid}`));
                userData = snapshot.exists() ? snapshot.val() : { role: 'admin', name: user.email.split('@')[0] }; // Default admin for first setup
                
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('app-wrapper').classList.remove('hidden');
                initAppUI();
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('app-wrapper').classList.add('hidden');
            }
        });

        window.logout = () => signOut(auth);

        // --- UI CORE ---
        function initAppUI() {
            document.getElementById('user-initial').innerText = userData.name.charAt(0).toUpperCase();
            document.getElementById('user-display-name').innerText = userData.name;
            document.getElementById('user-role-label').innerText = userData.role;
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            renderSidebar();
            renderModule('dashboard');
        }

        function renderSidebar() {
            const nav = document.getElementById('main-nav');
            nav.innerHTML = '';
            const userModules = rolesMap[userData.role].modules;

            userModules.forEach(mod => {
                const config = {
                    'dashboard': { label: 'Dashboard', icon: 'fa-chart-pie' },
                    'pendaftaran': { label: 'Pendaftaran', icon: 'fa-user-plus' },
                    'perawat': { label: 'Perawat (TTV)', icon: 'fa-stethoscope' },
                    'dokter': { label: 'Pemeriksaan Dokter', icon: 'fa-user-md' },
                    'radiologi': { label: 'Unit Radiologi', icon: 'fa-x-ray' },
                    'lab': { label: 'Unit Lab', icon: 'fa-vials' },
                    'farmasi': { label: 'Apotek/Farmasi', icon: 'fa-pills' },
                    'gudang': { label: 'Stok Obat', icon: 'fa-boxes-stacked' },
                    'kasir': { label: 'Kasir & Billing', icon: 'fa-receipt' },
                    'master': { label: 'Data Master', icon: 'fa-database' }
                };

                const div = document.createElement('div');
                div.className = `sidebar-item flex items-center gap-3 px-4 py-3 cursor-pointer font-medium text-slate-600 dark:text-slate-400 ${mod === 'dashboard' ? 'active' : ''}`;
                div.innerHTML = `<i class="fas ${config[mod].icon} w-5"></i> <span>${config[mod].label}</span>`;
                div.onclick = () => {
                    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                    div.classList.add('active');
                    renderModule(mod);
                };
                nav.appendChild(div);
            });
        }

        function renderModule(mod) {
            const display = document.getElementById('content-display');
            document.getElementById('page-title').innerText = mod.toUpperCase();
            
            // Basic Templates
            switch(mod) {
                case 'dashboard': renderDashboard(display); break;
                case 'pendaftaran': renderPendaftaran(display); break;
                case 'perawat': renderPerawat(display); break;
                case 'dokter': renderDokter(display); break;
                case 'gudang': renderGudang(display); break;
                case 'farmasi': renderFarmasi(display); break;
                case 'kasir': renderKasir(display); break;
                case 'radiologi': renderPenunjang(display, 'radiologi'); break;
                case 'lab': renderPenunjang(display, 'lab'); break;
                default: display.innerHTML = `<div class="p-10 text-center text-slate-400"><i class="fas fa-tools text-6xl mb-4"></i><p>Modul ${mod} sedang dalam pengembangan.</p></div>`;
            }
        }

        // --- MODULE: DASHBOARD ---
        async function renderDashboard(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="glass p-6 rounded-2xl border-l-4 border-indigo-500 shadow-sm animate__animated animate__fadeInUp">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Pasien Hari Ini</p>
                        <h3 class="text-3xl font-bold mt-1" id="dash-pasien-count">0</h3>
                    </div>
                    <div class="glass p-6 rounded-2xl border-l-4 border-emerald-500 shadow-sm animate__animated animate__fadeInUp" style="animation-delay: 0.1s">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Kunjungan Selesai</p>
                        <h3 class="text-3xl font-bold mt-1" id="dash-done-count">0</h3>
                    </div>
                    <div class="glass p-6 rounded-2xl border-l-4 border-amber-500 shadow-sm animate__animated animate__fadeInUp" style="animation-delay: 0.2s">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Menunggu Obat</p>
                        <h3 class="text-3xl font-bold mt-1" id="dash-farmasi-count">0</h3>
                    </div>
                    <div class="glass p-6 rounded-2xl border-l-4 border-rose-500 shadow-sm animate__animated animate__fadeInUp" style="animation-delay: 0.3s">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Stok Obat Kritis</p>
                        <h3 class="text-3xl font-bold mt-1">5</h3>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="glass p-6 rounded-2xl shadow-sm h-80">
                        <h4 class="font-bold mb-4">Statistik Kunjungan Mingguan</h4>
                        <canvas id="chartKunjungan"></canvas>
                    </div>
                    <div class="glass p-6 rounded-2xl shadow-sm h-80 overflow-y-auto">
                        <h4 class="font-bold mb-4">Antrian Berjalan</h4>
                        <div id="live-antrian" class="space-y-3 text-sm"></div>
                    </div>
                </div>
            `;
            
            // Fetch Real Stats
            onValue(ref(db, 'pendaftaran'), (snap) => {
                const data = snap.val() || {};
                const list = Object.values(data);
                document.getElementById('dash-pasien-count').innerText = list.length;
                document.getElementById('dash-done-count').innerText = list.filter(p => p.status === 'SELESAI').length;
                document.getElementById('dash-farmasi-count').innerText = list.filter(p => p.status === 'FARMASI').length;
                
                const antrian = document.getElementById('live-antrian');
                antrian.innerHTML = list.slice(-5).map(p => `
                    <div class="flex items-center justify-between p-3 bg-white dark:bg-slate-800 rounded-lg border border-slate-100 dark:border-slate-700">
                        <span><b>${p.norm}</b> - ${p.nama}</span>
                        <span class="px-2 py-1 rounded text-[10px] font-bold ${getStatusColor(p.status)} text-white">${p.status}</span>
                    </div>
                `).join('');
            });

            // Mini Chart
            new Chart(document.getElementById('chartKunjungan'), {
                type: 'line',
                data: {
                    labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
                    datasets: [{ label: 'Pasien', data: [12, 19, 15, 25, 22, 30, 10], borderColor: '#6366f1', tension: 0.4 }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        // --- MODULE: PENDAFTARAN ---
        function renderPendaftaran(el) {
            const today = new Date().toISOString().split('T')[0].replace(/-/g, '');
            const newNoRM = 'RM-' + today + '-' + Math.floor(1000 + Math.random() * 9000);

            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="md:col-span-1 glass p-6 rounded-2xl shadow-lg h-fit">
                        <h4 class="font-bold text-xl mb-6 flex items-center gap-2"><i class="fas fa-plus-circle text-indigo-500"></i> Register Pasien Baru</h4>
                        <form id="form-pendaftaran" class="space-y-4">
                            <div>
                                <label class="text-xs font-bold text-slate-500">NOMOR REKAM MEDIS</label>
                                <input type="text" id="p-norm" value="${newNoRM}" class="w-full bg-slate-100 p-3 rounded-xl font-mono font-bold text-indigo-600" readonly>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-500">NAMA LENGKAP</label>
                                <input type="text" id="p-nama" class="w-full border p-3 rounded-xl focus:ring-2 ring-indigo-500 outline-none" placeholder="Masukkan nama..." required>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-500">NIK (KTP)</label>
                                <input type="number" id="p-nik" class="w-full border p-3 rounded-xl focus:ring-2 ring-indigo-500 outline-none" placeholder="16 Digit NIK" required>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-xs font-bold text-slate-500">JNS KELAMIN</label>
                                    <select id="p-jk" class="w-full border p-3 rounded-xl outline-none">
                                        <option value="L">Laki-laki</option>
                                        <option value="P">Perempuan</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-xs font-bold text-slate-500">TGL LAHIR</label>
                                    <input type="date" id="p-tgl" class="w-full border p-3 rounded-xl outline-none" required>
                                </div>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-500">WHATSAPP</label>
                                <input type="number" id="p-wa" class="w-full border p-3 rounded-xl outline-none" placeholder="628xxxx" required>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-500">ALAMAT</label>
                                <textarea id="p-alamat" class="w-full border p-3 rounded-xl outline-none" rows="2"></textarea>
                            </div>
                            <div class="flex flex-col gap-2 pt-4">
                                <button type="button" onclick="submitPasien('MASTER')" class="w-full bg-slate-200 hover:bg-slate-300 font-bold py-3 rounded-xl transition-all">Hanya Simpan Master</button>
                                <button type="button" onclick="submitPasien('PERAWAT')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all">Simpan & Daftarkan Kunjungan</button>
                            </div>
                        </form>
                    </div>
                    <div class="md:col-span-2 space-y-6">
                        <div class="glass p-6 rounded-2xl shadow-sm">
                            <h4 class="font-bold mb-4">Data Master Pasien Terdaftar</h4>
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm">
                                    <thead>
                                        <tr class="text-left border-b border-slate-100">
                                            <th class="p-3">No RM</th>
                                            <th class="p-3">Nama</th>
                                            <th class="p-3">Alamat</th>
                                            <th class="p-3">WA</th>
                                            <th class="p-3">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody id="table-pasien-master"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            onValue(ref(db, 'master_pasien'), (snap) => {
                const data = snap.val() || {};
                const rows = Object.entries(data).map(([id, p]) => `
                    <tr class="border-b border-slate-50 hover:bg-slate-50 transition-all cursor-pointer">
                        <td class="p-3 font-mono font-bold">${p.norm}</td>
                        <td class="p-3 font-semibold">${p.nama}</td>
                        <td class="p-3 text-slate-500 truncate max-w-[150px]">${p.alamat}</td>
                        <td class="p-3">
                            <a href="https://wa.me/${p.wa}" target="_blank" class="text-green-600 hover:underline"><i class="fab fa-whatsapp"></i> ${p.wa}</a>
                        </td>
                        <td class="p-3">
                             <button onclick="daftarkanDariMaster('${id}')" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg font-bold text-xs">DAFTAR</button>
                        </td>
                    </tr>
                `).reverse().join('');
                document.getElementById('table-pasien-master').innerHTML = rows;
            });
        }

        window.submitPasien = async (target) => {
            const payload = {
                norm: document.getElementById('p-norm').value,
                nama: document.getElementById('p-nama').value,
                nik: document.getElementById('p-nik').value,
                jk: document.getElementById('p-jk').value,
                tgl: document.getElementById('p-tgl').value,
                wa: document.getElementById('p-wa').value,
                alamat: document.getElementById('p-alamat').value,
                status: target,
                tgl_daftar: new Date().toISOString()
            };

            try {
                // Simpan ke Master Pasien
                await push(ref(db, 'master_pasien'), payload);
                
                // Jika Daftar Kunjungan
                if (target === 'PERAWAT') {
                    await push(ref(db, 'pendaftaran'), payload);
                }
                
                toast('Data berhasil disimpan!', 'success');
                renderModule('pendaftaran');
            } catch (err) {
                toast(err.message, 'error');
            }
        };

        window.daftarkanDariMaster = async (id) => {
            const snapshot = await get(ref(db, `master_pasien/${id}`));
            const data = snapshot.val();
            data.status = 'PERAWAT';
            data.tgl_daftar = new Date().toISOString();
            await push(ref(db, 'pendaftaran'), data);
            toast(`${data.nama} didaftarkan ke perawat`, 'success');
        };

        // --- MODULE: PERAWAT ---
        function renderPerawat(el) {

            renderResepList();

        function renderResepList() {

            const diagnosa = document.getElementById('dr-diagnosa').value;
            const isRad = document.getElementById('order-rad').checked;
            const isLab = document.getElementById('order-lab').checked;

            const updates = {
                anamnesa,
                diagnosa,
                resep: currentResep,
                pemeriksaan_rad: isRad ? document.getElementById('det-rad').value : null,
                pemeriksaan_lab: isLab ? document.getElementById('det-lab').value : null,
                status: isRad ? 'RADIOLOGI' : (isLab ? 'LAB' : 'FARMASI'),
                waktu_dokter: new Date().toISOString()
            };

            // Update Stok Master (Simpel)
            const masterObatSnap = await get(ref(db, 'master_obat'));
            const masterObat = masterObatSnap.val();
            currentResep.forEach(item => {
                for(let key in masterObat) {
                    if(masterObat[key].nama === item.nama) {
                        update(ref(db, `master_obat/${key}`), { stok: masterObat[key].stok - item.qty });
                    }
                }
            });

            await update(ref(db, `pendaftaran/${id}`), updates);
            toast('Resume medis berhasil disimpan!', 'success');
            currentResep = [];
            hideModal();
        };

            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            div.className = `p-4 rounded-xl shadow-2xl mb-3 flex items-center gap-3 animate__animated animate__fadeInRight text-white font-bold ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
            div.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> <span>${msg}</span>`;
            container.appendChild(div);
            setTimeout(() => {
                div.classList.replace('animate__fadeInRight', 'animate__fadeOutRight');
                setTimeout(() => div.remove(), 500);
            }, 3000);
        };

        window.showModal = (content) => {
            const container = document.getElementById('modal-container');
            document.getElementById('modal-body').innerHTML = `
                <button onclick="hideModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
                ${content}
            `;
            container.classList.remove('hidden');
        };

        window.hideModal = () => document.getElementById('modal-container').classList.add('hidden');

        window.toggleDarkMode = () => document.body.classList.toggle('dark');

        function calculateAge(dob) {
            const diff = Date.now() - new Date(dob).getTime();
            return Math.abs(new Date(diff).getUTCFullYear() - 1970);
        }

        function getStatusColor(s) {
            const colors = { 'PERAWAT': 'bg-amber-500', 'DOKTER': 'bg-rose-500', 'FARMASI': 'bg-indigo-500', 'KASIR': 'bg-emerald-500', 'SELESAI': 'bg-slate-500' };
            return colors[s] || 'bg-slate-300';
        }

        window.kirimWA = (no, text) => {
            window.open(`https://wa.me/${no}?text=${encodeURIComponent(text)}`, '_blank');
        };

    </script>
</body>
</html>
