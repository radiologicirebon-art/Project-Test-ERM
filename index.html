<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-RM Klinik Pratama PRO</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- FIREBASE (WAJIB COMPAT VERSION) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f1f5f9;
}
.card {
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
</style>

</head>
<body class="flex items-center justify-center min-h-screen">

<div class="w-full max-w-md p-6">

    <!-- HEADER -->
    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-teal-600">E-RM PRO</h1>
        <p class="text-gray-500">Klinik Pratama Digital System</p>
    </div>

    <!-- CARD LOGIN -->
    <div class="bg-white card p-6">

        <h2 class="text-xl font-semibold mb-4 text-gray-700">Login Sistem</h2>

        <input id="email" type="email" placeholder="Email"
        class="w-full mb-3 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400">

        <input id="password" type="password" placeholder="Password"
        class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400">

        <button onclick="login()"
        class="w-full bg-teal-500 hover:bg-teal-600 text-white py-3 rounded-lg transition">
        Login
        </button>

    </div>

    <!-- FOOTER -->
    <p class="text-center text-xs text-gray-400 mt-6">
        © 2026 E-RM Klinik Pratama PRO v1.1
    </p>

</div>

<script>
/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyBx1cYtGcnppOhMmhH0wOXqwGFWLiGM7kk",
  authDomain: "develop-212.firebaseapp.com",
  databaseURL: "https://develop-212-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "develop-212",
  storageBucket: "develop-212.firebasestorage.app",
  messagingSenderId: "79717438597",
  appId: "1:79717438597:web:e28c0be0c64667891ec5ec"
};

/* ================= INIT ================= */
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* ================= LOGIN ================= */
function login(){
    let email = document.getElementById('email').value;
    let password = document.getElementById('password').value;

    if(!email || !password){
        Swal.fire('Error','Email & Password wajib diisi','error');
        return;
    }

    auth.signInWithEmailAndPassword(email, password)
    .then((userCredential)=>{
        let uid = userCredential.user.uid;

        db.ref('erm/users/' + uid).once('value')
        .then(snapshot=>{
            let data = snapshot.val();

            if(!data){
                Swal.fire('Error','User tidak memiliki role','error');
                return;
            }

            let role = data.role;

            Swal.fire({
                icon: 'success',
                title: 'Login Berhasil',
                timer: 1000,
                showConfirmButton: false
            });

            setTimeout(()=>{
                redirectByRole(role);
            },1000);
        });

    })
    .catch(error=>{
        Swal.fire('Login Gagal', error.message, 'error');
    });
}

/* ================= ROLE REDIRECT ================= */
function redirectByRole(role){

    switch(role){
        case 'pendaftaran':
            window.location.href = 'modules/pendaftaran.html';
            break;

        case 'perawat':
            window.location.href = 'modules/perawat.html';
            break;

        case 'dokter':
            window.location.href = 'modules/dokter.html';
            break;

        case 'radiologi':
            window.location.href = 'modules/radiologi.html';
            break;

        case 'lab':
            window.location.href = 'modules/lab.html';
            break;

        case 'farmasi':
            window.location.href = 'modules/farmasi.html';
            break;

        case 'gudang':
            window.location.href = 'modules/gudang.html';
            break;

        case 'kasir':
            window.location.href = 'modules/kasir.html';
            break;

        case 'admin':
            window.location.href = 'modules/admin.html';
            break;

        default:
            Swal.fire('Error','Role tidak dikenali','error');
    }
}
</script>

</body>
</html>
