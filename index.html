<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-RM Klinik Pratama Pro v1.1 - Develop-212</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .glass-morphism { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .loader-wrapper { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #f8fafc; }
        .hidden-el { display: none !important; }
        
        /* Animasi halusan */
        input:focus { transform: translateY(-1px); }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="loader" class="loader-wrapper">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-600 mb-4"></div>
            <p class="text-slate-500 font-medium animate__animated animate__pulse animate__infinite">Memuat Sistem E-RM...</p>
        </div>
    </div>

    <div id="auth-container" class="hidden-el min-h-screen flex items-center justify-center p-4 bg-slate-100">
        <div class="w-full max-w-md animate__animated animate__fadeInUp">
            <div class="bg-white p-8 rounded-3xl shadow-2xl border border-slate-200">
                <div class="text-center mb-8">
                    <div class="bg-blue-600 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/50">
                        <i class="fas fa-clinic-medical text-3xl text-white"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800">E-RM KLINIK PRO</h2>
                    <p class="text-slate-500">Silahkan login dengan akun terdaftar</p>
                </div>
                
                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Email Staff</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fas fa-envelope"></i>
                            </span>
                            <input type="email" id="loginEmail" required 
                                class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" 
                                placeholder="nama@klinik.com">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" id="loginPassword" required 
                                class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" 
                                placeholder="••••••••">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                        <i class="fas fa-sign-in-alt"></i> MASUK SISTEM
                    </button>
                </form>
                
                <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                    <p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Develop-212 v1.1</p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-layout" class="hidden-el min-h-screen flex flex-col">
        <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <i class="fas fa-hospital-alt text-blue-600 text-2xl"></i>
                <h1 class="font-bold text-lg tracking-tight">E-RM PRATAMA <span class="text-blue-600">PRO</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="user-display-name" class="text-sm font-bold leading-none capitalize"></p>
                    <p id="user-display-role" class="text-[10px] text-blue-600 font-bold uppercase"></p>
                </div>
                <button id="logoutBtn" class="bg-red-50 text-red-600 p-2 rounded-lg hover:bg-red-600 hover:text-white transition-all">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 flex overflow-hidden">
            <div class="flex-1 p-8 text-center mt-20">
                <h1 class="text-2xl font-bold">Selamat Datang di Dashboard</h1>
                <p class="text-slate-500">Menyiapkan modul sesuai Role Anda...</p>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Configuration (API Anda)
        const firebaseConfig = {
            apiKey: "AIzaSyBx1cYtGcnppOhMmhH0wOXqwGFWLiGM7kk",
            authDomain: "develop-212.firebaseapp.com",
            databaseURL: "https://develop-212-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "develop-212",
            storageBucket: "develop-212.firebasestorage.app",
            messagingSenderId: "79717438597",
            appId: "1:79717438597:web:e28c0be0c64667891ec5ec",
            measurementId: "G-7EDQWV1HV7"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Global State
        window.USER_DATA = null;

        // --- FUNGSI AUTH ---
        
        // Handle Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            Swal.fire({
                title: 'Memproses...',
                text: 'Sedang memverifikasi data',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                await signInWithEmailAndPassword(auth, email, password);
                Swal.fire({
                    icon: 'success',
                    title: 'Berhasil Masuk!',
                    showConfirmButton: false,
                    timer: 1500
                });
            } catch (error) {
                console.error(error);
                Swal.fire('Gagal Login', 'Email atau password salah / Akun tidak aktif.', 'error');
            }
        });

        // Handle Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            Swal.fire({
                title: 'Keluar?',
                text: "Sesi kerja anda akan diakhiri",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Ya, Keluar'
            }).then((result) => {
                if (result.isConfirmed) {
                    signOut(auth);
                }
            });
        });

        // Observer Status Login (Main Logic)
        onAuthStateChanged(auth, async (user) => {
            const loader = document.getElementById('loader');
            const authContainer = document.getElementById('auth-container');
            const mainLayout = document.getElementById('main-layout');

            if (user) {
                // User sudah login, cek Role di Realtime Database
                try {
                    const userRef = ref(db, 'users/' + user.uid);
                    const snapshot = await get(userRef);

                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        window.USER_DATA = data;
                        
                        // Update UI Header
                        document.getElementById('user-display-name').innerText = data.nama || 'Staff';
                        document.getElementById('user-display-role').innerText = data.role || 'No Role';
                        
                        // Tampilkan Layout Utama
                        authContainer.classList.add('hidden-el');
                        mainLayout.classList.remove('hidden-el');
                    } else {
                        // User terdaftar di Auth tapi data Role di DB tidak ada
                        Swal.fire('Akses Ditolak', 'User anda belum terdaftar di database staff. Hubungi IT.', 'error');
                        signOut(auth);
                    }
                } catch (err) {
                    console.error(err);
                    signOut(auth);
                }
            } else {
                // Belum login
                mainLayout.classList.add('hidden-el');
                authContainer.classList.remove('hidden-el');
            }
            
            // Sembunyikan loader setelah proses selesai
            setTimeout(() => loader.classList.add('hidden-el'), 800);
        });

    </script>
</body>
</html>
