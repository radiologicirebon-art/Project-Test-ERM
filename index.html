<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-RM KLINIK PRATAMA PRO v1.2 | RS MITRA PLUMBON</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4f46e5', secondary: '#6366f1' }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .dark .glass-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(71, 85, 105, 0.3); }
        .sidebar-link.active { background: #4f46e5; color: white; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-300">

    <div id="login-screen" class="fixed inset-0 z-[9999] bg-indigo-900 flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl animate__animated animate__zoomIn">
            <div class="text-center mb-8">
                <div class="h-16 w-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4"><i class="fas fa-hospital-symbol"></i></div>
                <h2 class="text-2xl font-extrabold text-slate-800">E-RM PLATINUM</h2>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">RS MITRA PLUMBON</p>
            </div>
            <form id="login-form" class="space-y-4">
                <input type="email" id="lgn-email" class="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none" placeholder="Email Staff" required>
                <input type="password" id="lgn-pass" class="w-full p-4 bg-slate-100 rounded-xl font-bold outline-none" placeholder="Password" required>
                <button type="submit" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-extrabold shadow-lg hover:bg-indigo-700 transition-all">MASUK SISTEM</button>
            </form>
        </div>
    </div>

    <div id="app" class="hidden flex h-screen overflow-hidden">
        <aside class="w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col z-40">
            <div class="p-8">
                <div class="flex items-center gap-3">
                    <div class="h-10 w-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-hand-holding-medical"></i></div>
                    <h1 class="font-extrabold text-xl tracking-tight dark:text-white">PRO v1.2</h1>
                </div>
            </div>
            <nav id="menu-list" class="flex-1 px-4 space-y-1 overflow-y-auto custom-scroll"></nav>
            <div class="p-6 border-t dark:border-slate-800">
                <div class="flex items-center gap-3 mb-4">
                    <div id="user-avatar" class="h-10 w-10 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold">?</div>
                    <div class="overflow-hidden">
                        <p id="user-name" class="text-sm font-bold truncate dark:text-white">User</p>
                        <p id="user-role" class="text-[10px] uppercase font-bold text-indigo-500">Role</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full py-2 text-rose-500 font-bold text-xs hover:bg-rose-50 rounded-lg transition-all">Keluar</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-50 dark:bg-slate-950 overflow-hidden">
            <header class="h-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b dark:border-slate-800 px-10 flex items-center justify-between">
                <div>
                    <h2 id="view-title" class="text-2xl font-extrabold dark:text-white">Dashboard</h2>
                    <p class="text-xs text-slate-400 font-medium uppercase tracking-tighter">Klinik Pratama RS Mitra Plumbon</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right hidden md:block">
                        <p id="digital-clock" class="font-bold dark:text-white text-lg">00:00:00</p>
                        <p id="date-label" class="text-[10px] text-slate-400 font-bold uppercase"></p>
                    </div>
                    <button onclick="document.documentElement.classList.toggle('dark')" class="h-10 w-10 rounded-full bg-slate-100 dark:bg-slate-800 dark:text-yellow-400 flex items-center justify-center"><i class="fas fa-moon"></i></button>
                </div>
            </header>
            <div id="main-view" class="flex-1 overflow-y-auto p-10 custom-scroll animate__animated animate__fadeIn"></div>
        </main>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white dark:bg-slate-900 w-full max-w-5xl max-h-[90vh] rounded-[2.5rem] shadow-2xl overflow-y-auto p-10 relative"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBx1cYtGcnppOhMmhH0wOXqwGFWLiGM7kk",
            authDomain: "develop-212.firebaseapp.com",
            databaseURL: "https://develop-212-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "develop-212",
            storageBucket: "develop-212.firebasestorage.app",
            messagingSenderId: "79717438597",
            appId: "1:79717438597:web:e28c0be0c64667891ec5ec"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        let userRole = 'pendaftaran'; // Default role

        // --- AUTH LOGIC ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await get(ref(db, `users/${user.uid}`));
                const data = snap.val();
                currentUser = user;
                userRole = data ? data.role : 'pendaftaran'; // Fallback role
                
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                initUI(data || { name: user.email, role: 'staff' });
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app').classList.add('hidden');
            }
        });

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('lgn-email').value, document.getElementById('lgn-pass').value);
            } catch (err) { Swal.fire('Error', 'Login gagal: ' + err.message, 'error'); }
        };

        window.logout = () => signOut(auth);

        // --- UI CORE ---
        function initUI(userData) {
            document.getElementById('user-name').innerText = userData.name;
            document.getElementById('user-role').innerText = userData.role;
            document.getElementById('user-avatar').innerText = userData.name.charAt(0).toUpperCase();
            renderSidebar();
            loadModule('dashboard');
            startClock();
        }

        const modules = [
            { id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard', roles: ['admin', 'owner', 'pendaftaran', 'perawat', 'dokter', 'farmasi', 'kasir', 'radiologi', 'lab'] },
            { id: 'pendaftaran', icon: 'fa-user-plus', label: 'Pendaftaran', roles: ['admin', 'pendaftaran'] },
            { id: 'perawat', icon: 'fa-stethoscope', label: 'Unit Perawat', roles: ['admin', 'perawat'] },
            { id: 'dokter', icon: 'fa-user-md', label: 'Unit Dokter', roles: ['admin', 'dokter'] },
            { id: 'radiologi', icon: 'fa-x-ray', label: 'Radiologi', roles: ['admin', 'radiologi'] },
            { id: 'lab', icon: 'fa-microscope', label: 'Laboratorium', roles: ['admin', 'lab'] },
            { id: 'farmasi', icon: 'fa-pills', label: 'Farmasi', roles: ['admin', 'farmasi'] },
            { id: 'gudang', icon: 'fa-warehouse', label: 'Gudang Farmasi', roles: ['admin', 'farmasi', 'owner'] },
            { id: 'kasir', icon: 'fa-cash-register', label: 'Kasir & Billing', roles: ['admin', 'kasir'] },
            { id: 'administrasi', icon: 'fa-tools', label: 'Administrasi', roles: ['admin', 'owner'] }
        ];

        function renderSidebar() {
            const nav = document.getElementById('menu-list');
            nav.innerHTML = modules.filter(m => m.roles.includes(userRole)).map(m => `
                <div onclick="loadModule('${m.id}')" class="sidebar-link group flex items-center gap-3 px-6 py-4 rounded-2xl cursor-pointer font-bold text-slate-500 dark:text-slate-400 hover:text-indigo-600 transition-all">
                    <i class="fas ${m.icon} text-lg"></i> <span class="text-sm">${m.label}</span>
                </div>
            `).join('');
        }

        window.loadModule = (id) => {
            document.getElementById('view-title').innerText = id.toUpperCase();
            const el = document.getElementById('main-view');
            el.innerHTML = `<div class="flex items-center justify-center h-full"><div class="animate-spin h-10 w-10 border-4 border-indigo-600 border-t-transparent rounded-full"></div></div>`;
            
            switch(id) {
                case 'dashboard': renderDashboard(el); break;
                case 'pendaftaran': renderPendaftaran(el); break;
                case 'perawat': renderPerawat(el); break;
                case 'dokter': renderDokter(el); break;
                case 'radiologi': renderPenunjang(el, 'RADIOLOGI'); break;
                case 'lab': renderPenunjang(el, 'LAB'); break;
                case 'farmasi': renderFarmasi(el); break;
                case 'gudang': renderGudang(el); break;
                case 'kasir': renderKasir(el); break;
                case 'administrasi': renderAdmin(el); break;
            }
        };

        // --- MODULE: PENDAFTARAN ---
        function renderPendaftaran(el) {
            const today = new Date().toISOString().split('T')[0].replace(/-/g, '');
            const autoRM = `RM-${today}-${Math.floor(1000 + Math.random() * 9000)}`;

            el.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="glass-card p-8 rounded-3xl h-fit">
                        <h3 class="text-xl font-bold mb-6">Registrasi Pasien</h3>
                        <form id="form-reg" class="space-y-4">
                            <div><label class="text-[10px] font-bold uppercase text-slate-400 ml-2">No. RM</label>
                            <input type="text" id="p-norm" value="${autoRM}" class="w-full p-4 bg-indigo-50 dark:bg-slate-800 rounded-xl font-bold text-indigo-600" readonly></div>
                            <input type="text" id="p-nama" placeholder="Nama Lengkap" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none" required>
                            <input type="number" id="p-nik" placeholder="NIK (16 Digit)" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none" required>
                            <div class="grid grid-cols-2 gap-4">
                                <select id="p-jk" class="p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none">
                                    <option value="Laki-laki">Laki-laki</option><option value="Perempuan">Perempuan</option>
                                </select>
                                <input type="date" id="p-tgl" class="p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none" required>
                            </div>
                            <input type="number" id="p-wa" placeholder="No. WhatsApp (628...)" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none" required>
                            <textarea id="p-alamat" placeholder="Alamat Lengkap" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none h-24"></textarea>
                            <div class="grid grid-cols-1 gap-3">
                                <button type="button" onclick="savePatient('MASTER')" class="w-full py-3 bg-slate-200 dark:bg-slate-700 font-bold rounded-xl">Simpan Master</button>
                                <button type="button" onclick="savePatient('ANTRIAN')" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl shadow-lg">Simpan & Daftar Perawat</button>
                            </div>
                        </form>
                    </div>
                    <div class="lg:col-span-2 glass-card p-8 rounded-3xl">
                        <h3 class="text-xl font-bold mb-6">Master Pasien</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="text-[10px] uppercase text-slate-400 font-bold border-b dark:border-slate-800">
                                    <tr><th class="pb-4">No. RM</th><th class="pb-4">Nama</th><th class="pb-4">Kontak</th><th class="pb-4">Aksi</th></tr>
                                </thead>
                                <tbody id="table-master" class="text-sm font-bold divide-y dark:divide-slate-800"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            
            onValue(ref(db, 'master_pasien'), (snap) => {
                const list = document.getElementById('table-master');
                if(!list) return;
                list.innerHTML = '';
                snap.forEach(child => {
                    const p = child.val();
                    list.innerHTML += `
                        <tr>
                            <td class="py-4 text-indigo-600">${p.norm}</td>
                            <td class="py-4 dark:text-white">${p.nama}<br><span class="text-[10px] text-slate-400">${p.nik}</span></td>
                            <td class="py-4 text-green-500">${p.wa}</td>
                            <td class="py-4"><button onclick="daftarLagi('${child.key}')" class="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 px-3 py-1 rounded-lg text-xs">Daftar Antrian</button></td>
                        </tr>
                    `;
                });
            });
        }

        window.savePatient = async (target) => {
            const data = {
                norm: document.getElementById('p-norm').value,
                nama: document.getElementById('p-nama').value,
                nik: document.getElementById('p-nik').value,
                jk: document.getElementById('p-jk').value,
                tgl: document.getElementById('p-tgl').value,
                wa: document.getElementById('p-wa').value,
                alamat: document.getElementById('p-alamat').value,
                ts: new Date().toISOString()
            };
            
            await push(ref(db, 'master_pasien'), data);
            if(target === 'ANTRIAN') {
                await push(ref(db, 'antrian'), { ...data, status: 'PERAWAT' });
                Swal.fire('Berhasil', 'Pasien masuk antrian perawat', 'success');
            } else {
                Swal.fire('Berhasil', 'Data disimpan ke master', 'success');
            }
            loadModule('pendaftaran');
        };

        window.daftarLagi = async (key) => {
            const snap = await get(ref(db, `master_pasien/${key}`));
            await push(ref(db, 'antrian'), { ...snap.val(), status: 'PERAWAT', ts: new Date().toISOString() });
            Swal.fire('Sukses', 'Pasien didaftarkan ulang', 'success');
        };

        // --- MODULE: PERAWAT (TTV) ---
        function renderPerawat(el) {
            el.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="list-perawat"></div>`;
            onValue(ref(db, 'antrian'), (snap) => {
                const list = document.getElementById('list-perawat');
                if(!list) return;
                list.innerHTML = '';
                snap.forEach(child => {
                    const p = child.val();
                    if(p.status === 'PERAWAT') {
                        list.innerHTML += `
                            <div ondblclick="modalTTV('${child.key}')" class="glass-card p-6 rounded-3xl cursor-pointer hover:border-indigo-500 transition-all">
                                <span class="bg-amber-100 text-amber-600 text-[10px] px-2 py-1 rounded-lg font-bold">ANTRIAN TTV</span>
                                <h4 class="text-lg font-bold mt-2 dark:text-white">${p.nama}</h4>
                                <p class="text-xs text-indigo-500 font-mono mb-4">${p.norm}</p>
                                <div class="text-[10px] text-slate-400 font-bold space-y-1">
                                    <p><i class="fas fa-venus-mars mr-2"></i>${p.jk}</p>
                                    <p><i class="fas fa-calendar mr-2"></i>${p.tgl}</p>
                                    <p><i class="fas fa-map-marker-alt mr-2"></i>${p.alamat}</p>
                                </div>
                                <button class="w-full mt-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold">Input TTV</button>
                            </div>
                        `;
                    }
                });
            });
        }

        window.modalTTV = async (key) => {
            const snap = await get(ref(db, `antrian/${key}`));
            const p = snap.val();
            showModal(`
                <h2 class="text-2xl font-bold mb-6">Pemeriksaan TTV: ${p.nama}</h2>
                <form id="form-ttv" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="ttv-tensi" placeholder="Tensi (mmHg)" class="p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none" required>
                    <input type="number" step="0.1" id="ttv-suhu" placeholder="Suhu (°C)" class="p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none" required>
                    <input type="number" id="ttv-nadi" placeholder="Nadi (x/mnt)" class="p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none" required>
                    <input type="number" id="ttv-nafas" placeholder="Nafas (x/mnt)" class="p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none" required>
                    <input type="number" id="ttv-bb" placeholder="Berat Badan (Kg)" class="p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none" required>
                    <input type="number" id="ttv-tb" placeholder="Tinggi Badan (Cm)" class="p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none" required>
                    <textarea id="ttv-keluhan" placeholder="Keluhan Utama" class="md:col-span-2 p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none h-24" required></textarea>
                    <button type="submit" class="md:col-span-2 py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg">Simpan & Teruskan ke Dokter</button>
                </form>
            `);

            document.getElementById('form-ttv').onsubmit = async (e) => {
                e.preventDefault();
                const ttvData = {
                    tensi: document.getElementById('ttv-tensi').value,
                    suhu: document.getElementById('ttv-suhu').value,
                    nadi: document.getElementById('ttv-nadi').value,
                    nafas: document.getElementById('ttv-nafas').value,
                    bb: document.getElementById('ttv-bb').value,
                    tb: document.getElementById('ttv-tb').value,
                    keluhan: document.getElementById('ttv-keluhan').value,
                };
                await update(ref(db, `antrian/${key}`), { ttv: ttvData, status: 'DOKTER' });
                Swal.fire('Berhasil', 'Pasien dialihkan ke Unit Dokter', 'success');
                closeModal();
            };
        };

        // --- MODULE: DOKTER (SOAP & RESEP) ---
        function renderDokter(el) {
            el.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="list-dokter"></div>`;
            onValue(ref(db, 'antrian'), (snap) => {
                const list = document.getElementById('list-dokter');
                if(!list) return;
                list.innerHTML = '';
                snap.forEach(child => {
                    const p = child.val();
                    if(p.status === 'DOKTER') {
                        list.innerHTML += `
                            <div ondblclick="modalDokter('${child.key}')" class="glass-card p-6 rounded-3xl cursor-pointer border-l-4 border-indigo-600">
                                <span class="bg-indigo-100 text-indigo-600 text-[10px] px-2 py-1 rounded-lg font-bold uppercase">Antrian Dokter</span>
                                <h4 class="text-lg font-bold mt-2 dark:text-white">${p.nama}</h4>
                                <div class="mt-4 p-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl text-[10px] font-bold">
                                    <p class="text-indigo-500 uppercase">TTV Terakhir:</p>
                                    <p class="dark:text-white">T: ${p.ttv.tensi} | S: ${p.ttv.suhu}°C | BB: ${p.ttv.bb}Kg</p>
                                    <p class="mt-1 italic dark:text-slate-400">"${p.ttv.keluhan}"</p>
                                </div>
                                <button class="w-full mt-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold">Periksa Pasien</button>
                            </div>
                        `;
                    }
                });
            });
        }

        window.modalDokter = async (key) => {
            const snap = await get(ref(db, `antrian/${key}`));
            const p = snap.val();
            const obatSnap = await get(ref(db, 'master_obat'));
            let obatOptions = '<option value="">-- Pilih Obat --</option>';
            obatSnap.forEach(o => { obatOptions += `<option value="${o.key}">${o.val().nama} (Stok: ${o.val().stok})</option>`; });

            showModal(`
                <div class="flex justify-between border-b dark:border-slate-800 pb-4 mb-6">
                    <h2 class="text-2xl font-bold dark:text-white">Pemeriksaan Dokter: ${p.nama}</h2>
                    <span class="text-indigo-600 font-mono font-bold">${p.norm}</span>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <h4 class="text-xs font-bold text-slate-400 uppercase">Anamnesa & Diagnosa</h4>
                        <textarea id="dr-anamnesa" placeholder="Anamnesa Tambahan" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none h-24"></textarea>
                        <textarea id="dr-diagnosa" placeholder="Diagnosa (ICD-10)" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none h-24"></textarea>
                        
                        <h4 class="text-xs font-bold text-slate-400 uppercase mt-6">Order Penunjang</h4>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2 font-bold dark:text-white text-sm">
                                <input type="checkbox" id="chk-rad" class="w-4 h-4"> E-Radiologi
                            </label>
                            <label class="flex items-center gap-2 font-bold dark:text-white text-sm">
                                <input type="checkbox" id="chk-lab" class="w-4 h-4"> E-Laboratorium
                            </label>
                        </div>
                        <input type="text" id="dr-penunjang-note" placeholder="Catatan Pemeriksaan Rad/Lab..." class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none">
                    </div>

                    <div class="space-y-4">
                        <h4 class="text-xs font-bold text-slate-400 uppercase">E-Resep Obat</h4>
                        <div class="flex gap-2">
                            <select id="resep-obat" class="flex-1 p-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none text-xs">${obatOptions}</select>
                            <input type="number" id="resep-qty" placeholder="Jml" class="w-16 p-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none text-xs">
                            <button onclick="addObatTemp()" class="bg-indigo-600 text-white px-4 rounded-xl"><i class="fas fa-plus"></i></button>
                        </div>
                        <input type="text" id="resep-dosis" placeholder="Aturan Pakai (Contoh: 3 x 1 Sesudah Makan)" class="w-full p-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none text-xs">
                        <div id="temp-resep-list" class="space-y-2 max-h-40 overflow-y-auto pr-2 custom-scroll"></div>
                        
                        <button onclick="simpanPemeriksaan('${key}')" class="w-full py-4 bg-green-600 text-white rounded-xl font-bold shadow-lg mt-4">Simpan Verifikasi & Selesai</button>
                    </div>
                </div>
            `);
            window.tempResep = [];
        };

        window.addObatTemp = async () => {
            const oId = document.getElementById('resep-obat').value;
            const qty = document.getElementById('resep-qty').value;
            const dosis = document.getElementById('resep-dosis').value;
            if(!oId || !qty) return;

            const snap = await get(ref(db, `master_obat/${oId}`));
            const data = snap.val();
            window.tempResep.push({ id: oId, nama: data.nama, qty: parseInt(qty), dosis: dosis, harga: data.harga });
            renderTempResep();
        };

        function renderTempResep() {
            const div = document.getElementById('temp-resep-list');
            div.innerHTML = window.tempResep.map((r, i) => `
                <div class="flex justify-between items-center p-3 bg-indigo-50 dark:bg-indigo-900/20 rounded-xl border border-indigo-100 dark:border-indigo-800">
                    <div>
                        <p class="text-xs font-bold dark:text-white">${r.nama} (${r.qty} Pcs)</p>
                        <p class="text-[10px] text-indigo-500 font-bold">${r.dosis}</p>
                    </div>
                    <button onclick="window.tempResep.splice(${i}, 1); renderTempResep();" class="text-rose-500 text-xs"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        window.simpanPemeriksaan = async (key) => {
            const hasRad = document.getElementById('chk-rad').checked;
            const hasLab = document.getElementById('chk-lab').checked;
            const examData = {
                anamnesa: document.getElementById('dr-anamnesa').value,
                diagnosa: document.getElementById('dr-diagnosa').value,
                penunjang_note: document.getElementById('dr-penunjang-note').value,
                resep: window.tempResep,
                status: hasRad ? 'RADIOLOGI' : (hasLab ? 'LAB' : 'FARMASI'),
                periksa_ts: new Date().toISOString()
            };

            // Potong Stok Obat Otomatis
            for (let item of window.tempResep) {
                const oRef = ref(db, `master_obat/${item.id}`);
                const snap = await get(oRef);
                const currentStok = snap.val().stok;
                await update(oRef, { stok: currentStok - item.qty });
            }

            await update(ref(db, `antrian/${key}`), examData);
            Swal.fire('Berhasil', 'Pemeriksaan disimpan. Pasien dialihkan.', 'success');
            closeModal();
        };

        // --- MODULE: RADIOLOGI & LAB ---
        function renderPenunjang(el, type) {
            el.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="list-penunjang"></div>`;
            onValue(ref(db, 'antrian'), (snap) => {
                const list = document.getElementById('list-penunjang');
                if(!list) return;
                list.innerHTML = '';
                snap.forEach(child => {
                    const p = child.val();
                    if(p.status === type) {
                        list.innerHTML += `
                            <div class="glass-card p-6 rounded-3xl border-l-4 border-rose-500">
                                <h4 class="text-lg font-bold dark:text-white">${p.nama}</h4>
                                <p class="text-xs font-bold text-slate-400 mb-2">Permintaan: ${p.penunjang_note || '-'}</p>
                                <textarea id="res-${child.key}" placeholder="Input Expertise/Hasil..." class="w-full p-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold text-xs mb-3"></textarea>
                                <button onclick="verifPenunjang('${child.key}', '${type}')" class="w-full py-2 bg-rose-600 text-white rounded-xl text-xs font-bold">Simpan & Kirim Farmasi</button>
                            </div>
                        `;
                    }
                });
            });
        }

        window.verifPenunjang = async (key, type) => {
            const hasil = document.getElementById(`res-${key}`).value;
            const updateData = { status: 'FARMASI' };
            if(type === 'RADIOLOGI') updateData.hasil_rad = hasil;
            else updateData.hasil_lab = hasil;
            
            await update(ref(db, `antrian/${key}`), updateData);
            Swal.fire('Sukses', 'Hasil penunjang dikirim ke Farmasi', 'success');
        };

        // --- MODULE: FARMASI ---
        function renderFarmasi(el) {
            el.innerHTML = `
                <div class="glass-card p-8 rounded-3xl">
                    <table class="w-full text-left">
                        <thead class="text-xs uppercase text-slate-400 font-bold border-b dark:border-slate-800">
                            <tr><th class="pb-4">Pasien</th><th class="pb-4">Obat/Resep</th><th class="pb-4">Status</th><th class="pb-4">Aksi</th></tr>
                        </thead>
                        <tbody id="table-farmasi" class="text-sm font-bold divide-y dark:divide-slate-800"></tbody>
                    </table>
                </div>
            `;
            onValue(ref(db, 'antrian'), (snap) => {
                const list = document.getElementById('table-farmasi');
                if(!list) return;
                list.innerHTML = '';
                snap.forEach(child => {
                    const p = child.val();
                    if(p.status === 'FARMASI') {
                        const resepHtml = p.resep.map(r => `<p>• ${r.nama} (${r.qty}) - <span class="text-indigo-500">${r.dosis}</span></p>`).join('');
                        list.innerHTML += `
                            <tr>
                                <td class="py-6 dark:text-white">${p.nama}<br><span class="text-[10px] text-slate-400">${p.norm}</span></td>
                                <td class="py-6 dark:text-slate-300 text-xs">${resepHtml}</td>
                                <td class="py-6"><span class="px-2 py-1 bg-amber-100 text-amber-600 rounded text-[10px]">MENUNGGU RACIK</span></td>
                                <td class="py-6"><button onclick="kirimKeKasir('${child.key}')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs">Selesai & Kasir</button></td>
                            </tr>
                        `;
                    }
                });
            });
        }

        window.kirimKeKasir = async (key) => {
            await update(ref(db, `antrian/${key}`), { status: 'KASIR' });
            Swal.fire('Selesai', 'Resep disiapkan. Pasien ke Kasir.', 'success');
        };

        // --- MODULE: GUDANG FARMASI ---
        function renderGudang(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                    <div class="glass-card p-8 rounded-3xl h-fit">
                        <h3 class="text-lg font-bold mb-4 dark:text-white">Input Stok Baru</h3>
                        <form id="form-obat" class="space-y-4">
                            <input type="text" id="o-nama" placeholder="Nama Obat" class="w-full p-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none" required>
                            <input type="number" id="o-stok" placeholder="Jumlah Stok" class="w-full p-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none" required>
                            <input type="text" id="o-satuan" placeholder="Satuan (Pcs/Strip)" class="w-full p-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none" required>
                            <input type="number" id="o-harga" placeholder="Harga Jual (IDR)" class="w-full p-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold outline-none" required>
                            <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg">Simpan Obat</button>
                        </form>
                    </div>
                    <div class="lg:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-4" id="list-inventory"></div>
                </div>
            `;

            document.getElementById('form-obat').onsubmit = async (e) => {
                e.preventDefault();
                const data = {
                    nama: document.getElementById('o-nama').value,
                    stok: parseInt(document.getElementById('o-stok').value),
                    satuan: document.getElementById('o-satuan').value,
                    harga: parseInt(document.getElementById('o-harga').value),
                };
                await push(ref(db, 'master_obat'), data);
                e.target.reset();
            };

            onValue(ref(db, 'master_obat'), (snap) => {
                const list = document.getElementById('list-inventory');
                if(!list) return;
                list.innerHTML = '';
                snap.forEach(child => {
                    const o = child.val();
                    list.innerHTML += `
                        <div class="glass-card p-6 rounded-3xl">
                            <div class="flex justify-between text-[10px] font-bold text-indigo-500 uppercase mb-2">
                                <span>${o.satuan}</span>
                                <span>Rp ${o.harga.toLocaleString()}</span>
                            </div>
                            <h4 class="font-bold dark:text-white">${o.nama}</h4>
                            <div class="mt-4 flex items-end justify-between">
                                <span class="text-3xl font-extrabold ${o.stok < 10 ? 'text-rose-500' : 'text-slate-800 dark:text-white'}">${o.stok}</span>
                                <button onclick="hapusObat('${child.key}')" class="text-slate-300 hover:text-rose-500"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        window.hapusObat = (key) => remove(ref(db, `master_obat/${key}`));

        // --- MODULE: KASIR ---
        function renderKasir(el) {
            el.innerHTML = `
                <div class="glass-card p-8 rounded-3xl">
                    <table class="w-full text-left">
                        <thead class="text-xs uppercase text-slate-400 font-bold border-b dark:border-slate-800">
                            <tr><th>Pasien</th><th>Tindakan</th><th>Biaya Obat</th><th>Total</th><th>Aksi</th></tr>
                        </thead>
                        <tbody id="table-kasir" class="text-sm font-bold divide-y dark:divide-slate-800"></tbody>
                    </table>
                </div>
            `;
            onValue(ref(db, 'antrian'), (snap) => {
                const list = document.getElementById('table-kasir');
                if(!list) return;
                list.innerHTML = '';
                snap.forEach(child => {
                    const p = child.val();
                    if(p.status === 'KASIR') {
                        const biayaObat = (p.resep || []).reduce((sum, item) => sum + (item.harga * item.qty), 0);
                        const jasaDokter = 50000;
                        const grandTotal = biayaObat + jasaDokter;
                        list.innerHTML += `
                            <tr>
                                <td class="py-6 dark:text-white">${p.nama}<br><span class="text-[10px] text-slate-400">${p.norm}</span></td>
                                <td class="py-6 dark:text-slate-300">Konsultasi Dokter Umum</td>
                                <td class="py-6 text-rose-500">Rp ${biayaObat.toLocaleString()}</td>
                                <td class="py-6 text-indigo-600 font-extrabold">Rp ${grandTotal.toLocaleString()}</td>
                                <td class="py-6"><button onclick="prosesBayar('${child.key}', ${grandTotal})" class="bg-green-600 text-white px-4 py-2 rounded-xl text-xs">Bayar Sekarang</button></td>
                            </tr>
                        `;
                    }
                });
            });
        }

        window.prosesBayar = async (key, total) => {
            const { isConfirmed } = await Swal.fire({
                title: 'Konfirmasi Pembayaran',
                text: `Total Tagihan: Rp ${total.toLocaleString()}`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Terima Uang & Selesai'
            });
            if(isConfirmed) {
                await update(ref(db, `antrian/${key}`), { status: 'SELESAI', total_bayar: total });
                Swal.fire('Lunas', 'Kunjungan Selesai. Struk dapat dicetak.', 'success');
            }
        };

        // --- UTILS ---
        function showModal(html) {
            const m = document.getElementById('modal');
            document.getElementById('modal-content').innerHTML = `<button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-rose-500"><i class="fas fa-times text-xl"></i></button>${html}`;
            m.classList.remove('hidden');
        }
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('digital-clock').innerText = now.toLocaleTimeString('id-ID');
                document.getElementById('date-label').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            }, 1000);
        }

        // Dashboard Simple Stats
        function renderDashboard(el) {
            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="glass-card p-6 rounded-3xl border-b-4 border-indigo-500">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Antrian Hari Ini</p>
                        <h3 id="stat-antrian" class="text-3xl font-extrabold dark:text-white">0</h3>
                    </div>
                    <div class="glass-card p-6 rounded-3xl border-b-4 border-green-500">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Selesai Layanan</p>
                        <h3 id="stat-selesai" class="text-3xl font-extrabold dark:text-white">0</h3>
                    </div>
                    <div class="glass-card p-6 rounded-3xl border-b-4 border-rose-500">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Pasien Baru</p>
                        <h3 id="stat-pasien" class="text-3xl font-extrabold dark:text-white">0</h3>
                    </div>
                    <div class="glass-card p-6 rounded-3xl border-b-4 border-amber-500">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Total Revenue</p>
                        <h3 id="stat-rev" class="text-2xl font-extrabold dark:text-white">Rp 0</h3>
                    </div>
                </div>
                <div class="glass-card p-10 rounded-[3rem] text-center">
                    <img src="https://illustrations.popsy.co/gray/medical-care.svg" class="w-64 mx-auto mb-6 opacity-80">
                    <h2 class="text-2xl font-extrabold dark:text-white">Selamat Datang di E-RM PLATINUM</h2>
                    <p class="text-slate-400 font-medium">Pilih menu di samping untuk mulai mengelola layanan kesehatan.</p>
                </div>
            `;
            onValue(ref(db, 'antrian'), (snap) => {
                let count = 0, done = 0, rev = 0;
                snap.forEach(c => {
                    count++;
                    if(c.val().status === 'SELESAI') {
                        done++;
                        rev += (c.val().total_bayar || 0);
                    }
                });
                if(document.getElementById('stat-antrian')) {
                    document.getElementById('stat-antrian').innerText = count;
                    document.getElementById('stat-selesai').innerText = done;
                    document.getElementById('stat-rev').innerText = `Rp ${rev.toLocaleString()}`;
                }
            });
        }
    </script>
</body>
</html>
