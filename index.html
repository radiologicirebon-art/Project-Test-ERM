<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-RM Klinik Pratama Pro v1.1 - Develop-212</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">

    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; scroll-behavior: smooth; }
        .loader-wrapper { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #f8fafc; }
        .hidden-el { display: none !important; }
        input:focus { transform: translateY(-1px); }
        button:active { transform: scale(0.98); }
    </style>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#2563eb', secondary: '#64748b' } } }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="loader" class="loader-wrapper">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-600 mb-4"></div>
            <p class="text-slate-500 font-medium animate-pulse">Menginisialisasi Sistem...</p>
        </div>
    </div>

    <div id="auth-container" class="hidden-el min-h-screen flex items-center justify-center p-4 bg-slate-100">
        <div class="w-full max-w-md animate__animated animate__fadeInUp">
            <div class="bg-white p-8 rounded-3xl shadow-2xl border border-slate-200">
                <div class="text-center mb-8">
                    <div class="bg-blue-600 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <i class="fas fa-clinic-medical text-3xl text-white"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800">E-RM KLINIK PRO</h2>
                    <p class="text-slate-500 text-sm">Pusat Rekam Medis Elektronik</p>
                </div>
                <form id="loginForm" class="space-y-5">
                    <input type="email" id="loginEmail" required class="w-full p-3 rounded-xl border border-slate-300 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Email Staff">
                    <input type="password" id="loginPassword" required class="w-full p-3 rounded-xl border border-slate-300 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Password">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all">MASUK SISTEM</button>
                </form>
            </div>
        </div>
    </div>

    <div id="main-layout" class="hidden-el min-h-screen flex flex-col overflow-hidden">
        <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm z-10">
            <div class="flex items-center gap-3">
                <i class="fas fa-hospital-alt text-blue-600 text-2xl"></i>
                <h1 class="font-extrabold text-lg">E-RM PRATAMA <span class="text-blue-600 font-medium">PRO</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden md:block text-right">
                    <p id="user-display-name" class="text-sm font-bold text-slate-700"></p>
                    <p id="user-display-role" class="text-[10px] text-blue-600 font-bold uppercase"></p>
                </div>
                <button id="logoutBtn" class="bg-red-50 text-red-600 p-2.5 rounded-xl hover:bg-red-600 hover:text-white transition-all">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </header>
        <main id="app-content" class="flex-1 flex overflow-hidden bg-slate-100"></main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, set, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBx1cYtGcnppOhMmhH0wOXqwGFWLiGM7kk",
            authDomain: "develop-212.firebaseapp.com",
            databaseURL: "https://develop-212-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "develop-212",
            storageBucket: "develop-212.firebasestorage.app",
            messagingSenderId: "79717438597",
            appId: "1:79717438597:web:e28c0be0c64667891ec5ec"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Export ke Window agar fungsi diluar module bisa akses
        window.db = db; window.dbRef = ref; window.dbGet = get; window.dbSet = set;

        // AUTH LOGIC
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            Swal.fire({ title: 'Otentikasi...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
                Swal.fire({ icon: 'success', title: 'Berhasil', timer: 1000, showConfirmButton: false });
            } catch (err) { Swal.fire('Gagal', 'Email/Password Salah', 'error'); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => location.reload()));

        onAuthStateChanged(auth, async (user) => {
            const authContainer = document.getElementById('auth-container');
            const mainLayout = document.getElementById('main-layout');
            if (user) {
                const snap = await get(ref(db, 'users/' + user.uid));
                if (snap.exists()) {
                    window.USER_DATA = snap.val();
                    document.getElementById('user-display-name').innerText = window.USER_DATA.nama;
                    document.getElementById('user-display-role').innerText = window.USER_DATA.role;
                    authContainer.classList.add('hidden-el');
                    mainLayout.classList.remove('hidden-el');
                    initDashboard();
                }
            } else {
                authContainer.classList.remove('hidden-el');
                mainLayout.classList.add('hidden-el');
            }
            document.getElementById('loader').classList.add('hidden-el');
        });

        // MENU & MODUL LOGIC
        const MENU_CONFIG = [
            { id: 'dashboard', label: 'Dashboard', icon: 'fa-th-large', roles: ['admin','pendaftaran','perawat','dokter','farmasi','gudang','kasir'] },
            { id: 'pendaftaran', label: 'Pendaftaran', icon: 'fa-user-plus', roles: ['admin', 'pendaftaran'] },
            { id: 'perawat', label: 'Perawat (TTV)', icon: 'fa-user-nurse', roles: ['admin', 'perawat'] },
            { id: 'dokter', label: 'Dokter (E-RM)', icon: 'fa-user-md', roles: ['admin', 'dokter'] },
            { id: 'farmasi', label: 'Farmasi', icon: 'fa-pills', roles: ['admin', 'farmasi'] },
            { id: 'kasir', label: 'Kasir', icon: 'fa-file-invoice-dollar', roles: ['admin', 'kasir'] }
        ];

        function initDashboard() {
            const appContent = document.getElementById('app-content');
            appContent.innerHTML = `
                <aside class="w-64 bg-white border-r flex flex-col">
                    <div class="p-4 flex-1 space-y-1" id="menu-container"></div>
                </aside>
                <section class="flex-1 overflow-y-auto p-6" id="module-container">
                    <div id="default-view">
                        <h2 class="text-2xl font-bold mb-4">Selamat Datang</h2>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="stats-area">
                            <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-blue-500">Pasien: 12</div>
                            <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-green-500">Antrian: 5</div>
                        </div>
                    </div>
                    <div id="active-module" class="hidden-el"></div>
                </section>
            `;
            const menuBox = document.getElementById('menu-container');
            MENU_CONFIG.forEach(item => {
                if (item.roles.includes(window.USER_DATA.role)) {
                    const btn = document.createElement('button');
                    btn.className = "w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold hover:bg-blue-50 text-slate-600";
                    btn.innerHTML = `<i class="fas ${item.icon} w-5"></i> <span>${item.label}</span>`;
                    btn.onclick = () => switchModule(item.id);
                    menuBox.appendChild(btn);
                }
            });
        }

        function switchModule(id) {
            const defView = document.getElementById('default-view');
            const actMod = document.getElementById('active-module');
            if(id === 'dashboard') {
                defView.classList.remove('hidden-el');
                actMod.classList.add('hidden-el');
            } else {
                defView.classList.add('hidden-el');
                actMod.classList.remove('hidden-el');
                if(id === 'pendaftaran') renderPendaftaran();
                else actMod.innerHTML = `<div class="p-20 text-center">Modul ${id} segera hadir.</div>`;
            }
        }

        async function renderPendaftaran() {
            const actMod = document.getElementById('active-module');
            actMod.innerHTML = `
                <div class="animate__animated animate__fadeIn space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-2xl font-bold">Registrasi Pasien Baru</h2>
                        <div class="bg-blue-600 text-white px-4 py-2 rounded-xl">
                            <p class="text-[10px] font-bold">No. RM Berikutnya</p>
                            <p id="next-rm-display" class="text-lg font-mono font-bold">Loading...</p>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                        <form id="formRegistrasi" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <input type="text" id="p-nama" class="p-3 bg-slate-50 border rounded-xl" placeholder="Nama Lengkap">
                            <input type="number" id="p-nik" class="p-3 bg-slate-50 border rounded-xl" placeholder="NIK">
                            <select id="p-jk" class="p-3 bg-slate-50 border rounded-xl"><option>Laki-laki</option><option>Perempuan</option></select>
                            <input type="date" id="p-tgl" class="p-3 bg-slate-50 border rounded-xl">
                            <textarea id="p-alamat" class="p-3 bg-slate-50 border rounded-xl" placeholder="Alamat"></textarea>
                            <input type="number" id="p-wa" class="p-3 bg-slate-50 border rounded-xl" placeholder="WhatsApp (628xxx)">
                            <div class="flex gap-2">
                                <button type="button" id="btnSimpan" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl">DAFTAR ANTRIAN</button>
                            </div>
                        </form>
                    </div>
                </div>`;
            
            const snap = await get(ref(db, 'settings/last_rm_number'));
            const lastNum = snap.exists() ? snap.val() : 1000;
            document.getElementById('next-rm-display').innerText = `RM-${lastNum + 1}`;

            document.getElementById('btnSimpan').onclick = async () => {
                const nama = document.getElementById('p-nama').value;
                if(!nama) return Swal.fire('Error', 'Nama wajib diisi', 'error');
                
                const newRM = `RM-${lastNum + 1}`;
                await set(ref(db, 'pasien/' + newRM), { nama, no_rm: newRM, nik: document.getElementById('p-nik').value });
                await set(ref(db, 'antrian/perawat/' + newRM), { nama, no_rm: newRM, status: 'Menunggu' });
                await set(ref(db, 'settings/last_rm_number'), lastNum + 1);
                
                Swal.fire('Berhasil', 'Pasien didaftarkan', 'success');
                renderPendaftaran();
            };
        }

        // Ekspos ke global agar tombol sidebar berfungsi
        window.initDashboard = initDashboard;
        window.switchModule = switchModule;
    </script>
</body>
</html>
